function di(label,val,color){return`<div style="background:#0A0F1E;border-radius:9px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">${label}</div><div style="font-size:13px;font-weight:600;color:${color}">${val}</div></div>`;}

async function delTask(id){
  if(!confirm('Xóa công việc này?'))return;
  tasks=tasks.filter(t=>t.id!==id);ls_set('tf_tasks',tasks);closeModal();render();toast('🗑️ Đã xóa');
  await deleteTaskRemote(id);
}

function openSetParent(childId) {
  const child = tasks.find(t => t.id === childId);
  if (!child) return;

  // Lấy danh sách task hợp lệ làm cha:
  // - Không phải chính nó
  // - Không phải subtask của nó (tránh vòng lặp)
  // - Chưa là việc con của task khác (chỉ 1 cấp cha)
  const childIds = new Set(getChildren(childId).map(t => t.id));
  childIds.add(childId);
  const candidates = tasks.filter(t =>
    !childIds.has(t.id) &&
    t.status !== 'done' &&
    !(t.parentId && Number(t.parentId) > 0) &&
    // User thường: chỉ gán vào việc cha của chính mình
    (isAdmin() || t.assignee === CONFIG.USERNAME)
  );

  const currentParent = getParent(child);

  const opts = candidates.map(t =>
    `<option value="${t.id}">${esc((t.title||'').substring(0,55))} [${esc(t.assignee||'')}]</option>`
  ).join('');

  document.getElementById('modal-container').innerHTML =
    '<div class="overlay" onclick="closeModal(event)">'
   +'<div class="modal" onclick="event.stopPropagation()" style="max-width:480px">'
   +'<div class="flex" style="justify-content:space-between;margin-bottom:16px">'
   +'<h3 style="font-family:\'Syne\',sans-serif;font-size:15px;font-weight:800">🔗 Gán làm việc con</h3>'
   +'<button class="btn btn-ghost btn-icon" onclick="closeModal()">✕</button>'
   +'</div>'
   +'<div style="background:#0A0F1E;border-radius:10px;padding:10px 12px;margin-bottom:14px;border-left:3px solid var(--accent);font-size:13px">'
   +'<div style="color:var(--muted);font-size:11px;margin-bottom:3px">Việc cần gán:</div>'
   +'<strong>' + esc((child.title||'').substring(0,60)) + '</strong>'
   +(currentParent ? '<div style="margin-top:6px;font-size:11px;color:var(--orange)">⚠️ Hiện đang là việc con của: <strong>' + esc((currentParent.title||'').substring(0,40)) + '</strong></div>' : '')
   +'</div>'
   +'<div class="flex-col">'
   +'<div><label class="field-label">Chọn việc cha <span style="color:var(--red)">*</span></label>'
   +'<input class="input" id="sp-search" placeholder="Tìm nhanh tên công việc..." oninput="filterSetParent()" style="margin-bottom:6px">'
   +'<select class="input" id="sp-parent" size="6" style="height:auto;padding:4px">'
   + opts
   +'</select>'
   +'<div style="font-size:11px;color:var(--muted);margin-top:4px">Hiện ' + candidates.length + ' việc có thể làm cha' + (isAdmin() ? ' (tất cả đầu mối)' : ' (việc của bạn)') + '</div>'
   +'</div>'
   +'</div>'
   +'<div style="margin-top:6px">'
   +'<button class="btn btn-ghost btn-sm" style="width:100%;margin-bottom:8px;border:1px dashed var(--red);color:var(--red)" onclick="doSetParent(' + childId + ', null)">🗑️ Tách ra — bỏ việc cha (thành việc độc lập)</button>'
   +'</div>'
   +'<div class="flex" style="margin-top:10px;gap:9px">'
   +'<button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Hủy</button>'
   +'<button class="btn btn-primary" style="flex:2" onclick="doSetParent(' + childId + ')">🔗 Xác nhận gán</button>'
   +'</div>'
   +'</div></div>';
}

function filterSetParent() {
  const q = (document.getElementById('sp-search')?.value||'').toLowerCase();
  const sel = document.getElementById('sp-parent');
  if (!sel) return;
  [...sel.options].forEach(opt => {
    opt.style.display = opt.text.toLowerCase().includes(q) ? '' : 'none';
  });
}

async function doSetParent(childId, forceNull) {
  const child = tasks.find(t => t.id === childId);
  if (!child) return;

  let newParentId = null;
  if (forceNull !== null && forceNull !== undefined) {
    newParentId = null; // tách ra
  } else {
    const sel = document.getElementById('sp-parent');
    if (!sel || !sel.value) { toast('Chưa chọn việc cha!', 'error'); return; }
    newParentId = Number(sel.value);
    if (newParentId === childId) { toast('Không thể tự gán chính mình!', 'error'); return; }
  }

  const now = new Date().toISOString();
  const parentTask = newParentId ? tasks.find(t => t.id === newParentId) : null;
  const updateEntry = {
    time: now,
    content: newParentId
      ? `🔗 Gán làm việc con của: "${(parentTask?.title||'').substring(0,40)}" bởi ${CONFIG.USERNAME}`
      : `🔓 Tách thành việc độc lập bởi ${CONFIG.USERNAME}`,
    user: CONFIG.USERNAME, status: child.status, progress: child.progress
  };

  tasks = tasks.map(t => t.id === childId
    ? {...t, parentId: newParentId, updatedBy: CONFIG.USERNAME, updatedAt: now, updates: [...(t.updates||[]), updateEntry]}
    : t
  );
  ls_set('tf_tasks', tasks);
  closeModal();
  render();
  toast(newParentId ? `🔗 Đã gán làm việc con!` : '🔓 Đã tách thành việc độc lập!');
  const updated = tasks.find(t => t.id === childId);
  if (updated) await saveTask(updated);
}

function openAddSubtask(parentId) {
  var parent = tasks.find(function(t){return t.id===parentId;}); if(!parent) return;

// VOICE SMART FILL — parse câu nói → điền form
// ═══════════════════════════════════════════════════════════════
function parseVoiceDate(txt) {
  const t = txt.toLowerCase();
  const now = new Date();
  // "hôm nay"
  if (/hôm nay/.test(t)) return today();
  // "ngày mai" / "mai"
  if (/ngày mai|^mai\b/.test(t)) { const d=new Date(now); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
  // "tuần sau"
  if (/tuần sau/.test(t)) { const d=new Date(now); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); }
  // "cuối tháng"
  if (/cuối tháng/.test(t)) { const d=new Date(now.getFullYear(), now.getMonth()+1, 0); return d.toISOString().slice(0,10); }
  // "31 tháng 3" / "31/3" / "31-3"
  const m1 = t.match(/(\d{1,2})\s*(?:tháng|\/|-)\s*(\d{1,2})(?:\s*(?:năm|\/|-)?\s*(\d{4}))?/);
  if (m1) {
    const day=m1[1].padStart(2,'0'), mon=m1[2].padStart(2,'0'), yr=m1[3]||new Date().getFullYear();
    return `${yr}-${mon}-${day}`;
  }
  // "2026-03-31"
  const m2 = t.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m2) return m2[0];
  return '';
}

function parseVoicePriority(txt) {
  const t = txt.toLowerCase();
  if (/khẩn|cấp thiết|critical/.test(t)) return 'critical';
  if (/cao|high|quan trọng/.test(t)) return 'high';
  if (/thấp|low|không gấp/.test(t)) return 'low';
  return 'medium';
}

function parseVoiceToForm(text, mode) {
  // mode: 'add' | 'update'
  const t = text;
  const lower = t.toLowerCase();

  // ── Title: phần đầu trước keyword đầu tiên
  const keywordPattern = /\b(giao cho|của|deadline|hạn|ngày|ưu tiên|danh mục|loại|ghi chú|note|mô tả|pyc|mã|tiến độ|hoàn thành|cập nhật)\b/i;
  const km = t.search(keywordPattern);
  const titleRaw = km > 0 ? t.slice(0, km).trim() : t.trim();
  // Clean prefix words
  const title = titleRaw.replace(/^(thêm việc|tạo việc|thêm|tạo|việc|cập nhật)\s*/i, '').trim();

  // ── Assignee
  const assigneeM = t.match(/(?:giao cho|của|cho)\s+([a-zA-Z0-9_\.]+)/i);
  const assignee = assigneeM ? assigneeM[1].trim() : '';

  // ── Deadline
  const deadlineM = t.match(/(?:deadline|hạn|ngày hạn|đến ngày|hết ngày)\s+(.{3,25}?)(?:\s*(?:,|ưu tiên|danh mục|ghi chú|pyc|$))/i);
  const dueDate = deadlineM ? parseVoiceDate(deadlineM[1]) : '';

  // ── Priority
  const priorityM = t.match(/(?:ưu tiên)\s+(\S+(?:\s+\S+)?)/i);
  const priority = priorityM ? parseVoicePriority(priorityM[1]) : '';

  // ── Mục tiêu (desc)
  const descM = t.match(/(?:mục tiêu|desc|mô tả)\s+(.+?)(?:\s*(?:,|deadline|ưu tiên|ghi chú|pyc|$))/i);
  const category = ''; // bỏ parse danh mục
  const desc = descM ? descM[1].trim() : '';

  // ── Note
  const noteM = t.match(/(?:ghi chú|note)\s+(.+?)(?:\s*(?:,|deadline|ưu tiên|pyc|$))/i);
  const note = noteM ? noteM[1].trim() : '';

  // ── PYC
  const pycM = t.match(/(?:pyc|mã)\s+([^\s,]+)/i);
  const pyc = pycM ? pycM[1].trim() : '';

  // ── Progress (for update)
  const progressM = t.match(/(\d{1,3})\s*%/);
  const progress = progressM ? parseInt(progressM[1]) : null;

  // ── ProgressNote (for update) — nội dung cập nhật
  const pnoteM = t.match(/(?:cập nhật|tiến độ|nội dung|kết quả)\s+(.+?)(?:\s*(?:,|deadline|ưu tiên|danh mục|ghi chú|pyc|$))/i);
  const progressNote = pnoteM ? pnoteM[1].trim() : '';

  return { title, assignee, dueDate, priority, category, desc, note, pyc, progress, progressNote };
}

function voiceSmartFill(btnId, mode) {
  if(isListening){if(recognition)recognition.stop();return;}
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){
    toast('Trình duyệt không hỗ trợ. Dùng Chrome/Edge hoặc mic bàn phím trên iOS','error');return;
  }
  const btn=document.getElementById(btnId);
  const fbId = mode==='add' ? 'voice-fb' : 'voice-fb2';
  const fb=document.getElementById(fbId);

  function startRecognition() {
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();recognition.lang='vi-VN';recognition.continuous=false;recognition.interimResults=true;
    if(btn){btn.textContent='⏹️ Đang nghe...';btn.style.background='rgba(255,71,87,.2)';}
    if(fb){fb.style.display='block';fb.innerHTML='🎤 Đang lắng nghe, hãy nói...';}

    recognition.onresult=e=>{
      const txt=Array.from(e.results).map(r=>r[0].transcript).join('');
      if(fb){fb.style.display='block';fb.innerHTML='🎤 <em>'+esc(txt)+'</em>';}
      if(e.results[0].isFinal){
        const parsed = parseVoiceToForm(txt, mode);
        if(mode==='add'){
          if(parsed.title) { const el=document.getElementById('a-title'); if(el) el.value=parsed.title; }
          if(parsed.assignee) { const el=document.getElementById('a-assignee'); if(el) el.value=parsed.assignee; }
          if(parsed.dueDate) { const el=document.getElementById('a-due'); if(el) el.value=parsed.dueDate; }
          if(parsed.priority) { const el=document.getElementById('a-pri'); if(el) el.value=parsed.priority; }
          if(parsed.category) { const el=document.getElementById('a-cat'); if(el) el.value=parsed.category; }
          if(parsed.pyc) { const el=document.getElementById('a-pyc'); if(el) el.value=parsed.pyc; }
          if(parsed.note) { const el=document.getElementById('a-note'); if(el) el.value=parsed.note; }
          const filled=[];
          if(parsed.title) filled.push('📋 '+parsed.title);
          if(parsed.assignee) filled.push('👤 '+parsed.assignee);
          if(parsed.dueDate) filled.push('📅 '+parsed.dueDate);
          if(parsed.priority) filled.push('⚡ '+parsed.priority);
          if(parsed.category) filled.push('🏷️ '+parsed.category);
          if(fb) fb.innerHTML='✅ Đã điền: '+filled.join(' · ')+'<br><span style="font-size:11px;color:var(--muted)">Kiểm tra lại và bấm Thêm</span>';
        } else {
          if(parsed.progressNote) { const el=document.getElementById('u-note'); if(el) el.value=parsed.progressNote; }
          if(parsed.progress!==null) { const el=document.getElementById('u-prog'); if(el){el.value=parsed.progress;el.dispatchEvent(new Event('input'));}}
          if(fb) {
            const filled=[];
            if(parsed.progressNote) filled.push('📝 '+parsed.progressNote.substring(0,40));
            if(parsed.progress!==null) filled.push('📊 '+parsed.progress+'%');
            fb.innerHTML='✅ Đã điền: '+filled.join(' · ')+'<br><span style="font-size:11px;color:var(--muted)">Kiểm tra lại và bấm Lưu</span>';
          }
        }
      }
    };
    recognition.onend=()=>{
      isListening=false;
      if(btn){btn.textContent='🎤 Nhập bằng giọng nói';btn.style.background='';}
    };
    recognition.onerror=(e)=>{
      isListening=false;
      if(btn){btn.textContent='🎤 Nhập bằng giọng nói';btn.style.background='';}
      if(e.error==='not-allowed'||e.error==='permission-denied'){
        if(fb){fb.style.display='block';fb.innerHTML='⚠️ <strong>Chưa cấp quyền mic.</strong><br>Bấm vào biểu tượng 🔒 hoặc 🎤 trên thanh địa chỉ trình duyệt → cho phép Microphone → thử lại.';}
        toast('Cần cấp quyền microphone cho trang web này','error');
      } else {
        toast('Lỗi giọng nói: '+e.error,'error');
      }
    };
    recognition.start();isListening=true;
  }

  // Xin quyền mic (chỉ 1 lần, sau đó dùng cache)
  withMicPermission(
    () => startRecognition(),
    () => {
      if(fb){fb.style.display='block';fb.innerHTML='⚠️ <strong>Chưa cấp quyền mic.</strong><br>Bấm vào biểu tượng 🔒 hoặc 🎤 trên thanh địa chỉ trình duyệt → cho phép Microphone → thử lại.';}
      toast('Cần cấp quyền microphone cho trang web này','error');
    }
  );
}

function scheduleAutoParseTitle() {
  clearTimeout(_autoParseTimer);
  _autoParseTimer = setTimeout(autoParseTitle, 1200);

function autoParseTitle() {
  const el = document.getElementById('a-title');
  if(!el) return;
  const txt = el.value;
  // Only auto-parse if sentence contains keywords (otherwise just a title)
  const hasKeyword = /giao cho|deadline|ưu tiên|mục tiêu|ghi chú|pyc/i.test(txt);
  if(!hasKeyword || txt.length < 10) return;

function focusVoice(el) { /* disabled – dùng nút mic thay thế */ }

function toggleVoice(inputId, btnId) {
  // Nếu đang nghe thì dừng
  if (isListening) { if (recognition) recognition.stop(); return; }
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    toast('Trình duyệt không hỗ trợ voice. Dùng Chrome/Edge', 'error'); return;
  }
  const el  = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const fb  = document.getElementById('voice-fb') || document.getElementById('voice-fb2');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'vi-VN';          // Tiếng Việt
  recognition.continuous = false;
  recognition.interimResults = true;

  if (btn) { btn.classList.add('voice-active'); btn.textContent = '⏹️'; }
  if (fb)  { fb.style.display = 'block'; fb.innerHTML = '🎤 Đang nghe...'; }

  recognition.onresult = e => {
    const txt = Array.from(e.results).map(r => r[0].transcript).join('');
    if (el) el.value = txt;
    if (fb) fb.innerHTML = '🎤 <em>' + esc(txt) + '</em>';
  };
  recognition.onend = () => {
    isListening = false;
    if (btn) { btn.classList.remove('voice-active'); btn.textContent = '🎤'; }
  };
  recognition.onerror = e => {
    isListening = false;
    if (btn) { btn.classList.remove('voice-active'); btn.textContent = '🎤'; }
    if (e.error === 'not-allowed') {
      if (fb) fb.innerHTML = '⚠️ Chưa cấp quyền mic – nhấn 🔒 trên thanh địa chỉ → Cho phép Microphone';
      toast('Cần cấp quyền microphone', 'error');
    } else if (e.error === 'language-not-supported') {
      // Fallback: thử lại với ngôn ngữ hệ thống
      if (fb) fb.innerHTML = '⚠️ Tiếng Việt chưa được cài – thử nhận dạng ngôn ngữ hệ thống';
      toast('Cài tiếng Việt trong Windows Speech để dùng giọng nói VI', 'warn');
    } else {
      toast('Lỗi voice: ' + e.error, 'error');
    }
  };

  try {
    recognition.start();
    isListening = true;
  } catch(err) {
    isListening = false;
    toast('Không thể bật mic: ' + err.message, 'error');
  }
}
function stopVoice(){if(recognition){recognition.stop();recognition=null;}isListening=false;}

// Tự động bind overlay close mỗi khi modal-container thay đổi
(function(){
  var mc = document.getElementById('modal-container');
  if(!mc) return;
  var _orig = Object.getOwnPropertyDescriptor(Element.prototype,'innerHTML');
  // Dùng MutationObserver thay vì patch setter (an toàn hơn)
  new MutationObserver(function(){
    var ov = mc.querySelector('.overlay');

  }).observe(mc,{childList:true,subtree:false});

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Track mousedown từ trong modal để chặn drag ra overlay đóng modal
var _mousedownInsideModal = false;

  var mc = document.getElementById('modal-container');
  if(!mc || !mc.children.length){ _mousedownInsideModal=false; return; }
  var inner = mc.querySelector('.modal');
  _mousedownInsideModal = inner ? inner.contains(e.target) : false;
});
// Reset sau mouseup — dù thả chuột ở đâu
document.addEventListener('mouseup', function(){

function closeModal(e){

    if(e.target!==e.currentTarget)return;

    if(_mousedownInsideModal)return;
  }
  _mousedownInsideModal=false;
  stopVoice();document.getElementById('modal-container').innerHTML='';

// Snapshot: lưu toàn bộ state task tại thời điểm TRƯỚC khi user thay đổi
// Format: { id, taskId, time, user, label, snapshot: {...task} }
function saveSnapshot(taskBefore) {
  if (!taskBefore) return; // new task, no prior state to snapshot
  const snapshots = ls_get('tf_snapshots', []);
  snapshots.push({
    id: Date.now() + Math.random(),
    taskId: taskBefore.id,
    time: new Date().toISOString(),
    user: CONFIG.USERNAME,
    label: `${taskBefore.status} → ? | ${taskBefore.progress}% | ${(taskBefore.progressNote||'').substring(0,40)}`,
    snapshot: JSON.parse(JSON.stringify(taskBefore)),
  });
  // Giữ tối đa 200 snapshots
  if (snapshots.length > 200) snapshots.splice(0, snapshots.length - 200);
  ls_set('tf_snapshots', snapshots);
}

function getSnapshots(taskId, user) {
  const all = ls_get('tf_snapshots', []);
  return all.filter(s => (!taskId || s.taskId === taskId) && (!user || s.user === user))
            .sort((a,b) => new Date(b.time) - new Date(a.time));
}

function confirmBulkRollback() {
  const targetUser = document.getElementById('rb-bulk-user')?.value || 'all';
  const targetTime = document.getElementById('rb-bulk-time')?.value;
  if (!targetTime) { toast('Vui lòng chọn thời điểm rollback!', 'warn'); return; }

  const dt = new Date(targetTime);
  const dtLabel = fmtDT(dt);
  const userLabel = targetUser === 'all' ? 'tất cả user' : `user "${targetUser}"`;

  if (!confirm(`Rollback ${userLabel} về trạng thái trước ${dtLabel}?\n\nTất cả công việc sẽ được khôi phục về snapshot gần nhất trước thời điểm này. Hành động không thể hoàn tác!`)) return;

  const snapshots = ls_get('tf_snapshots', []);
  const affectedTasks = targetUser === 'all' ? tasks : tasks.filter(t => t.assignee === targetUser);
  let restoredCount = 0, skippedCount = 0;

  affectedTasks.forEach(task => {
    // Tìm snapshot gần nhất TRƯỚC thời điểm target
    const candidates = snapshots
      .filter(s => String(s.taskId) === String(task.id) && new Date(s.time) <= dt)
      .sort((a,b) => new Date(b.time) - new Date(a.time));

    if (!candidates.length) { skippedCount++; return; }
    const bestSnap = candidates[0];

    // Lưu snapshot hiện tại trước khi ghi đè
    saveSnapshot(task);

    const restored = {
      ...bestSnap.snapshot,
      updatedBy: CONFIG.USERNAME,
      updatedAt: new Date().toISOString(),
      updates: [...(bestSnap.snapshot.updates||[]), {
        time: new Date().toISOString(),
        content: `↩️ Bulk rollback về ${fmtDT(new Date(bestSnap.time))} bởi admin ${CONFIG.USERNAME}`,
        user: CONFIG.USERNAME
      }]
    };
    tasks = tasks.map(t => String(t.id) === String(task.id) ? restored : t);
    restoredCount++;
  });

  ls_set('tf_tasks', tasks);
  closeModal(); render();
  toast(`↩️ Đã rollback ${restoredCount} công việc về trước ${dtLabel}${skippedCount?` (${skippedCount} không có snapshot)`:''}!`, 'success');
  if (CONFIG.SCRIPT_URL) {
    const restoredTasks = targetUser === 'all' ? tasks : tasks.filter(t=>t.assignee===targetUser);
    apiPost({action:'upsertBatch', tasks:restoredTasks, user:CONFIG.USERNAME});
  }
}

function scheduleWeeklySnapshot() {
  function checkAndSnap() {
    if (!isAdmin() || !CONFIG.USERNAME) return;
    const now = new Date();
    const isFriday = now.getDay() === 5;          // Thứ 6
    const isAfter17 = now.getHours() >= 17;
    const isWindow = now.getHours() === 17 && now.getMinutes() < 10; // trong 10 phút
    if (!isFriday || !isAfter17 || !isWindow) return;

    // Kiểm tra đã chụp tuần này chưa
    const lastSnap = ls_get('tf_last_weekly_snapshot', '');
    if (lastSnap) {
      const lastDate = new Date(lastSnap);
      const sameWeek = lastDate >= getWeekStart(now);
      if (sameWeek) return; // đã chụp tuần này rồi
    }
    doAutoWeeklySnapshot();
  }

  function getWeekStart(d) {
    const s = new Date(d);
    s.setDate(d.getDate() - d.getDay() + 1); // Thứ 2
    s.setHours(0,0,0,0);
    return s;
  }

  // Check ngay khi init
  checkAndSnap();
  // Check mỗi phút
  setInterval(checkAndSnap, 60 * 1000);
}

      </div>
    </div>`;
  }).join('') + (snapshots.length>60?`<div style="text-align:center;padding:8px;color:var(--muted);font-size:12px">Hiển thị 60/${snapshots.length} snapshot</div>`:'');
}

function previewSnapshot(snapId) {
  const snapshots = ls_get('tf_snapshots', []);
  const s = snapshots.find(x=>x.id==snapId); if(!s)return;
  const snap = s.snapshot;
  const p = PRIORITIES[snap.priority]||PRIORITIES.medium;
  const st = STATUSES[snap.status]||STATUSES.todo;
  document.getElementById('modal-container').insertAdjacentHTML('beforeend', `
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:flex;align-items:center;justify-content:center;padding:14px" onclick="this.remove()">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:14px;margin-bottom:12px">👁️ Xem snapshot – ${fmtDT(new Date(s.time))}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:3px">Lưu bởi: <strong>${esc(s.user)}</strong></div>
      <div style="border-left:3px solid ${p.color};padding-left:12px;margin:12px 0">
        <div style="font-weight:700">${esc(snap.title)}</div>
        ${snap.desc?`<div style="font-size:12px;color:var(--muted);margin-top:3px">${esc(snap.desc)}</div>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-bottom:10px">
        <div><span style="color:var(--muted)">Trạng thái: </span><span style="color:${st.color}">${st.icon} ${st.label}</span></div>
        <div><span style="color:var(--muted)">Tiến độ: </span><strong>${snap.progress||0}%</strong></div>
        <div><span style="color:var(--muted)">Deadline: </span>${fmtDate(snap.dueDate)||'N/A'}</div>
        <div><span style="color:var(--muted)">Đầu mối: </span>${esc(snap.assignee)}</div>
      </div>
      ${snap.progressNote?`<div style="background:#0A0F1E;border-radius:8px;padding:10px;font-size:12px;white-space:pre-wrap;margin-bottom:8px">${esc(snap.progressNote)}</div>`:''}
      ${snap.issue?`<div style="background:rgba(255,159,67,.07);border-radius:8px;padding:10px;font-size:12px;margin-bottom:8px"><span style="color:var(--orange)">⚠️ </span>${esc(snap.issue)}</div>`:''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-ghost" style="flex:1" onclick="this.closest('[style*=position]').remove()">Đóng</button>
        <button class="btn btn-warn" style="flex:2" onclick="this.closest('[style*=position]').remove();confirmRollback('${snapId}')">↩️ Khôi phục snapshot này</button>
      </div>
    </div>
  </div>`);
}

function confirmRollback(snapId) {
  const snapshots = ls_get('tf_snapshots', []);
  const s = snapshots.find(x=>x.id==snapId); if(!s)return;
  const t = tasks.find(x=>x.id===s.taskId);
  if(!t){toast('Task đã bị xóa, không thể rollback','error');return;}
  if(!confirm(`Khôi phục task "${t.title.substring(0,40)}" về trạng thái lúc ${fmtDT(new Date(s.time))}?\n\nHành động này sẽ ghi đè dữ liệu hiện tại.`)) return;
  doRollback(snapId);
}

async function doRollback(snapId) {
  const snapshots = ls_get('tf_snapshots', []);
  const s = snapshots.find(x=>x.id==snapId); if(!s)return;

  // Lưu snapshot của state hiện tại trước khi rollback
  const currentTask = tasks.find(x=>x.id===s.taskId);
  if(currentTask) saveSnapshot(currentTask);

  // Khôi phục
  const restored = {
    ...s.snapshot,
    updatedBy: CONFIG.USERNAME,
    updatedAt: new Date().toISOString(),
    updates: [...(s.snapshot.updates||[]), {
      time: new Date().toISOString(),
      content: `↩️ Rollback về ${fmtDT(new Date(s.time))} bởi admin ${CONFIG.USERNAME}`,
      user: CONFIG.USERNAME
    }]
  };
  tasks = tasks.map(t=>t.id===s.taskId ? restored : t);
  ls_set('tf_tasks', tasks);
  closeModal(); render();
  toast(`↩️ Đã khôi phục về trạng thái ${fmtDT(new Date(s.time))}!`, 'success');
  await saveTask(restored);
}
