function renderLocalSummary(ru, period) {
  const el = document.getElementById('local-summary-content');
  if (!el) return;
  try {
    el.innerHTML = buildLocalSummary(ru, period);
  } catch(e) {
    el.innerHTML = `<div style="color:var(--red);font-size:13px;padding:10px">❌ Lỗi tổng hợp: ${esc(e.message)}</div>`;
  }
}

function buildLocalSummary(ru, period) {
  const now = new Date();
  const priorityOrder = {critical:0, high:1, medium:2, low:3};

  const statusLabels = {done:'Hoàn thành',inprogress:'Đang làm',overdue:'Quá hạn',todo:'Chưa làm',pending_accept:'Chờ tiếp nhận',pending_done:'Chờ duyệt HT'};
  const statusColor = {done:'var(--green)',inprogress:'var(--accent)',overdue:'var(--red)',todo:'var(--muted)',pending_accept:'var(--orange)',pending_done:'var(--orange)'};
  const priorityLabels = {critical:'🔴 Cực kỳ khẩn',high:'🟠 Khẩn',medium:'🟡 Trung bình',low:'🔵 Thấp'};
  const periodLabels2 = {week:'tuần này',month:'tháng này',quarter:'quý này',year:'năm này',all:'toàn bộ'};

  function getPeriodRange() {
    const mon = new Date(now); mon.setDate(now.getDate()-now.getDay()+1); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
    if(period==='week') return [mon, sun];
    if(period==='month') return [new Date(now.getFullYear(),now.getMonth(),1), new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59)];
    if(period==='quarter') { const q=Math.floor(now.getMonth()/3); return [new Date(now.getFullYear(),q*3,1), new Date(now.getFullYear(),q*3+3,0,23,59,59)]; }
    if(period==='year') return [new Date(now.getFullYear(),0,1), new Date(now.getFullYear(),11,31,23,59,59)];
    return [new Date(0), new Date(8640000000000000)];
  }
  const [pStart, pEnd] = getPeriodRange();
  function inRange(d) { return d >= pStart && d <= pEnd; }
  function parseDate(s) {
    if(!s) return null;
    if(s.includes('T')) return new Date(s);
    const p=s.split(/[\/\-]/);
    if(p.length===3) return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    return new Date(s);
  }
  function inPeriodCheck(t) {
    if(period==='all') return true;
    const dateStr = t.dueDate || t.updatedAt || '';
    if(!dateStr || dateStr.length < 7) return true;
    let d;
    if(dateStr.includes('T')) { d = new Date(dateStr); }
    else if(dateStr.match(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/)) {
      const p = dateStr.split(/[\/\-]/); d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
    } else { d = new Date(dateStr); }
    if(isNaN(d)) return true;
    return inRange(d);
  }

  const baseTasks = (ru==='all') ? tasks : tasks.filter(t=>t.assignee===ru);
  const priorityGroups = ['critical','high','medium','low'];

  // Với mỗi task: tìm các updates nằm trong kỳ
  const tasksWithChanges = baseTasks.map(t => {
    const updatesInPeriod = (t.updates||[]).filter(u => u.time && inRange(new Date(u.time)));
    // Task mới tạo trong kỳ
    const createdInPeriod = t.createdAt && inRange(new Date(t.createdAt));
    // Deadline nằm trong kỳ
    const dueInPeriod = t.dueDate && inRange(parseDate(t.dueDate));
    if(updatesInPeriod.length===0 && !createdInPeriod && !dueInPeriod) return null;
    return { t, updatesInPeriod, createdInPeriod, dueInPeriod };
  }).filter(Boolean).sort((a,b)=>(priorityOrder[a.t.priority]??9)-(priorityOrder[b.t.priority]??9));

  if(tasksWithChanges.length===0) {
    return `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Không có công việc nào có thay đổi trong ${periodLabels2[period]||period}</div>`;
  }

  // Nhóm theo priority
  let html = `<div style="font-size:11px;color:var(--muted);margin-bottom:12px">${tasksWithChanges.length} công việc có thay đổi · ${periodLabels2[period]||period}</div>`;

  priorityGroups.forEach(prio => {
    const group = tasksWithChanges.filter(x => x.t.priority===prio);
    if(group.length===0) return;
    html += `<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)">${priorityLabels[prio]||prio}</div>`;

    group.forEach(({t, updatesInPeriod, createdInPeriod, dueInPeriod}) => {
      const st = statusLabels[t.status]||t.status;
      const stc = statusColor[t.status]||'var(--muted)';
      const dl = daysLeft(t.dueDate);
      const dlColor = dl < 0 ? 'var(--red)' : dl <= 3 ? 'var(--orange)' : 'var(--muted)';

      // Progress trend từ updates trong kỳ
      const progUpdates = updatesInPeriod.filter(u=>u.progress!=null).sort((a,b)=>new Date(a.time)-new Date(b.time));
      let progressTrend = '';
      if(progUpdates.length >= 2) {
        const first = progUpdates[0].progress, last = progUpdates[progUpdates.length-1].progress;
        const diff = last - first;
        const arrow = diff > 0 ? `<span style="color:var(--green)">↑${diff}%</span>` : diff < 0 ? `<span style="color:var(--red)">↓${Math.abs(diff)}%</span>` : `<span style="color:var(--muted)">→</span>`;
        progressTrend = `<span style="font-size:11px;color:var(--muted)">${first}% ${arrow} ${last}%</span>`;
      } else if(progUpdates.length===1) {
        progressTrend = `<span style="font-size:11px;color:var(--muted)">→ ${progUpdates[0].progress}%</span>`;
      }

      html += `<div style="border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;background:rgba(255,255,255,.02)" onclick="openDetail(${t.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
          <div style="font-weight:600;font-size:13px;flex:1;line-height:1.4">${esc(t.title)}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <span style="font-size:11px;color:${stc};font-weight:600;background:rgba(255,255,255,.05);padding:2px 7px;border-radius:20px">${st}</span>
            ${t.dueDate?`<span style="font-size:10px;color:${dlColor}">${fmtDate(t.dueDate)}</span>`:''}
          </div>
        </div>`;

      // Mục tiêu
      if(t.desc) { const ds=String(t.desc); html += `<div style="font-size:11px;color:var(--subtle);margin-bottom:6px;padding:6px 8px;background:rgba(79,110,255,.06);border-radius:6px;border-left:2px solid rgba(79,110,255,.3)">🎯 ${esc(ds.substring(0,120))}${ds.length>120?'…':''}</div>`; }

      // Tag mới tạo
      if(createdInPeriod) html += `<div style="font-size:11px;color:var(--green);margin-bottom:5px">✨ Mới tạo trong kỳ này · ${fmtDT(new Date(t.createdAt))}</div>`;

      // Progress trend
      if(progressTrend) html += `<div style="margin-bottom:6px;display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted)">Tiến độ:</span>${progressTrend}<div style="flex:1;height:4px;background:var(--border);border-radius:2px;max-width:80px"><div style="height:4px;background:var(--accent);border-radius:2px;width:${t.progress}%"></div></div></div>`;

      // Kết quả & Vướng mắc hiện tại
      if(t.result) { const rs=String(t.result); html += `<div style="font-size:11px;color:var(--subtle);margin-bottom:4px">✅ Kết quả: ${esc(rs.substring(0,100))}${rs.length>100?'…':''}</div>`; }
      if(t.issue)  { const is=String(t.issue);  html += `<div style="font-size:11px;color:var(--orange);margin-bottom:4px">⚠️ Vướng mắc: ${esc(is.substring(0,100))}${is.length>100?'…':''}</div>`; }

      // Danh sách updates trong kỳ
      if(updatesInPeriod.length > 0) {
        html += `<div style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px">
          <div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">📝 Cập nhật trong kỳ (${updatesInPeriod.length})</div>`;
        updatesInPeriod.slice().reverse().forEach(u => {
          const prog = u.progress!=null ? `<span style="background:rgba(79,110,255,.15);color:var(--accent);border-radius:10px;padding:1px 6px;font-size:10px;font-weight:600">${u.progress}%</span>` : '';
          const newStatus = u.status ? `<span style="font-size:10px;color:${statusColor[u.status]||'var(--muted)'}">→ ${statusLabels[u.status]||u.status}</span>` : '';
          const nc = u.content ? String(u.content) : '';
          const note = nc ? `<div style="font-size:11px;color:var(--subtle);margin-top:3px;line-height:1.5">${esc(nc.substring(0,120))}${nc.length>120?'…':''}</div>` : '';
          html += `<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;gap:2px">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:10px;color:var(--muted)">${u.time?fmtDT(new Date(u.time)):''}</span>
              <span style="font-size:10px;color:var(--muted)">·</span>
              <span style="font-size:10px;color:var(--subtle)">${esc(u.user||'')}</span>
              ${prog} ${newStatus}
            </div>${note}
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  html += `<div style="font-size:10px;color:var(--border);text-align:right;margin-top:4px">Cập nhật lúc ${fmtDT(now)}</div>`;
  return html;
}

function buildUserActivitySection(period) {
  const now = new Date();
  const periodLabels = {week:'Tuần này',month:'Tháng này',quarter:'Quý này',year:'Năm này',all:'Tất cả'};

  function getPRange() {
    const mon=new Date(now); mon.setDate(now.getDate()-now.getDay()+1); mon.setHours(0,0,0,0);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
    if(period==='week') return [mon, sun];
    if(period==='month') return [new Date(now.getFullYear(),now.getMonth(),1), new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999)];
    if(period==='quarter') { const q=Math.floor(now.getMonth()/3); return [new Date(now.getFullYear(),q*3,1), new Date(now.getFullYear(),q*3+3,0,23,59,59,999)]; }
    if(period==='year') return [new Date(now.getFullYear(),0,1), new Date(now.getFullYear(),11,31,23,59,59,999)];
    return [new Date(0), new Date(8640000000000000)];
  }
  const [pStart, pEnd] = getPRange();
  function inRange(d) { const dt = d instanceof Date ? d : new Date(d); return dt >= pStart && dt <= pEnd; }
  function daysSince(isoStr) {
    if(!isoStr) return null;
    return Math.floor((now - new Date(isoStr)) / 86400000);
  }

  const allUsers = getAssignees();

  // ── Cập nhật công việc (nguồn chính – đã sync GAS) ──────────
  const allLogs = ls_get('tf_updatelogs', []);
  const updateInPeriod = allLogs.filter(l => l.u?.time && inRange(l.u.time));
  const updateByUser = {};
  updateInPeriod.forEach(l => {
    const u = l.u?.user||''; if(!u) return;
    if(!updateByUser[u]) updateByUser[u] = { count:0, tasks:new Set(), last:null, contents:[] };
    updateByUser[u].count++;
    if(l.taskId) updateByUser[u].tasks.add(String(l.taskId));
    if(!updateByUser[u].last || l.u.time > updateByUser[u].last) updateByUser[u].last = l.u.time;
    if(l.u.content) updateByUser[u].contents.push(l.u.content.substring(0,40));
  });

  // ── Lượt xem task (local, chỉ thiết bị admin) ──────────────
  const viewLogs = ls_get('tf_viewlogs', []);
  const viewInPeriod = viewLogs.filter(l => l.time && inRange(l.time) && l.type === 'detail');
  const viewByUser = {};
  viewInPeriod.forEach(l => {
    const u = l.user||''; if(!u) return;
    if(!viewByUser[u]) viewByUser[u] = { count:0, tasks:new Set(), last:null };
    viewByUser[u].count++;
    if(l.taskId) viewByUser[u].tasks.add(String(l.taskId));
    if(!viewByUser[u].last || l.time > viewByUser[u].last) viewByUser[u].last = l.time;
  });

  // ── Thống kê task của từng user ─────────────────────────────
  // Đếm ngày làm việc (bỏ T7=6, CN=0)
  function workdaysSince(isoStr) {
    if(!isoStr) return 999;
    let d = new Date(isoStr); d.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    let count = 0;
    while(d < today) { d.setDate(d.getDate()+1); const dow=d.getDay(); if(dow!==0&&dow!==6) count++; }
    return count;
  }
  const tasksByUser = {};
  tasks.forEach(t => {
    if(!t.assignee) return;
    if(!tasksByUser[t.assignee]) tasksByUser[t.assignee] = { total:0, done:0, overdue:0, inprog:0, notUpdated:[] };
    tasksByUser[t.assignee].total++;
    if(t.status==='done') tasksByUser[t.assignee].done++;
    if(t.status==='overdue') tasksByUser[t.assignee].overdue++;
    if(t.status==='inprogress') tasksByUser[t.assignee].inprog++;
    if(t.status!=='done'&&t.status!=='pending_accept') {
      const lastUpT = (t.updates||[]).length ? t.updates[t.updates.length-1].time : null;
      if(workdaysSince(lastUpT) >= 2) tasksByUser[t.assignee].notUpdated.push(t);
    }
  });

  // ── Tổng hợp theo user ──────────────────────────────────────
  const userSet = new Set([...allUsers, ...Object.keys(updateByUser)]);
  const rows = [...userSet].map(u => {
    const upd = updateByUser[u] || {};
    const viw = viewByUser[u] || {};
    const tsk = tasksByUser[u] || {};
    const lastUpdStr = upd.last || null;
    const daysSinceUpdate = daysSince(lastUpdStr);
    // Điểm tích cực: cập nhật × 2 + xem task
    const score = (upd.count||0)*2 + (viw.count||0);
    // Cờ cảnh báo: có task đang chạy nhưng chưa cập nhật ≥ 2 ngày làm việc
    const warnInactive = (tsk.total - tsk.done > 0) && (tsk.notUpdated?.length > 0);
    return { user:u, updCount:upd.count||0, updTasks:upd.tasks?.size||0, lastUpd:lastUpdStr,
             viewCount:viw.count||0, viewTasks:viw.tasks?.size||0, lastView:viw.last||null,
             tskTotal:tsk.total||0, tskDone:tsk.done||0, tskOverdue:tsk.overdue||0,
             notUpdatedCount: tsk.notUpdated?.length||0, score, warnInactive,
             daysSinceUpdate };
  }).sort((a,b) => b.score - a.score);

  const activeUsers = rows.filter(r=>r.updCount>0).length;
  const totalUpdates = rows.reduce((s,r)=>s+r.updCount,0);
  const warnCount = rows.filter(r=>r.warnInactive).length;
  const maxUpd = Math.max(...rows.map(r=>r.updCount), 1);

  const periodSwitcher = `<div style="display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden">
    ${[{v:'week',l:'Tuần'},{v:'month',l:'Tháng'},{v:'quarter',l:'Quý'},{v:'year',l:'Năm'},{v:'all',l:'Tất cả'}].map(p=>
      `<button style="padding:4px 10px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:${reportPeriod===p.v?'var(--accent)':'transparent'};color:${reportPeriod===p.v?'#fff':'var(--muted)'};transition:all .15s" onclick="reportPeriod='${p.v}';render()">${p.l}</button>`
    ).join('')}
  </div>`;

  // Màu mức độ hoạt động
  function actColor(count, max) {
    if(count===0) return 'var(--border)';
    const r = count/max;
    if(r >= 0.6) return 'var(--green)';
    if(r >= 0.25) return 'var(--orange)';
    return '#A29BFE';
  }
  function fmtAgo(isoStr) {
    if(!isoStr) return '—';
    const d = daysSince(isoStr);
    if(d===0) return 'Hôm nay';
    if(d===1) return 'Hôm qua';
    if(d<7)  return d + ' ngày trước';
    if(d<30) return Math.floor(d/7) + ' tuần trước';
    return Math.floor(d/30) + ' tháng trước';
  }

  return `<div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">📊</span>
        <div>
          <div class="section-title" style="margin:0">Mức độ tham gia</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${periodLabels[period]||period} · <span style="color:var(--green)">${activeUsers} đã cập nhật</span> · ${totalUpdates} lượt cập nhật${warnCount>0?` · <span style="color:var(--red)">${warnCount} chưa hoạt động</span>`:''}</div>
        </div>
      </div>
      ${periodSwitcher}
    </div>

    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;padding:6px 10px;background:rgba(79,110,255,.05);border-radius:7px;line-height:1.6">
      💡 <strong style="color:var(--text)">Đánh giá dựa trên:</strong>
      ✏️ Số lần cập nhật tiến độ (đã đồng bộ GAS) · 📋 Số CV được xem · ✅ Hoàn thành · 🚨 Quá hạn · ⚠️ CV đang chạy chưa cập nhật ≥ 2 ngày làm việc
    </div>

    <div style="display:flex;flex-direction:column;gap:0">
      ${rows.map((r,i) => {
        const barW = Math.round(r.updCount/maxUpd*100);
        const ac = actColor(r.updCount, maxUpd);
        const rank = i===0&&r.updCount>0?'🥇':i===1&&r.updCount>0?'🥈':i===2&&r.updCount>0?'🥉':'';
        const warn = r.warnInactive ? `<span style="font-size:10px;background:rgba(255,71,87,.12);color:var(--red);padding:1px 6px;border-radius:8px;font-weight:700">⚠️${r.notUpdatedCount} CV chưa cập nhật</span>` : '';
        return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;flex-wrap:wrap">
              <span style="font-weight:700;font-size:13px">${rank} ${esc(r.user)}</span>
              ${r.user===ADMIN_USER?'<span style="font-size:9px;color:var(--accent);background:rgba(79,110,255,.1);padding:1px 5px;border-radius:5px">admin</span>':''}
              ${warn}
            </div>
            <div style="display:flex;align-items:center;gap:10px;font-size:11px;flex-shrink:0">
              <span title="Lần cập nhật gần nhất" style="color:var(--muted)">${fmtAgo(r.lastUpd)}</span>
            </div>
          </div>
          <div style="display:flex;gap:16px;font-size:11px;margin-bottom:6px;flex-wrap:wrap">
            <span title="Số lần cập nhật tiến độ (đã đồng bộ GAS)" style="color:var(--accent)">✏️ <strong>${r.updCount}</strong></span>
            <span title="Số CV được xem" style="color:var(--muted)">📋 <strong style="color:var(--text)">${r.viewCount}</strong></span>
            <span title="Công việc hoàn thành" style="color:var(--green)">✅ <strong>${r.tskDone}</strong></span>
            ${r.tskOverdue>0?`<span title="Công việc quá hạn" style="color:var(--red)">🚨 <strong>${r.tskOverdue}</strong></span>`:''}
            ${r.warnInactive?`<span title="CV đang chạy chưa cập nhật ≥ 2 ngày làm việc" style="color:var(--orange)">⚠️ <strong>${r.notUpdatedCount}</strong></span>`:''}
          </div>
          <div style="height:5px;background:rgba(255,255,255,.05);border-radius:3px">
            <div style="height:5px;background:${ac};border-radius:3px;width:${barW}%;transition:width .3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="font-size:10px;color:var(--border);margin-top:10px;line-height:1.6">
      * Dữ liệu cập nhật được đồng bộ từ GAS — tin cậy cho mọi thiết bị.<br>
      * Lượt xem task chỉ ghi nhận trên thiết bị admin hiện tại.
    </div>
  </div>`;
}

async function quickDone(id) {
  const oldTask = tasks.find(t=>Number(t.id)===Number(id));
  if (!oldTask) return;
  if (!isAdmin() && oldTask.assignee !== CONFIG.USERNAME) {
    toast('⛔ Bạn chỉ có thể đánh dấu hoàn thành công việc của mình!', 'error');
    return;
  }
  if (isAdmin()) {
    // Admin: done trực tiếp, không cần duyệt
    saveSnapshot(oldTask);
    const now = new Date().toISOString();
    const updateEntry = { time:now, content:`✅ Admin đánh dấu hoàn thành`, detail:`Trạng thái → Hoàn thành | Bởi: ${CONFIG.USERNAME}`, user:CONFIG.USERNAME, status:'done', progress:100 };
    const updatedTask = {...oldTask, status:'done', progress:100, updatedBy:CONFIG.USERNAME, updatedAt:now, updates:[...(oldTask.updates||[]),updateEntry]};
    tasks = tasks.map(t=>t.id===id?updatedTask:t);
    ls_set('tf_tasks',tasks); render(); toast('✅ Đã hoàn thành!');
    const ulCache=ls_get('tf_updatelogs',[]);ulCache.unshift({taskId:id,taskTitle:oldTask.title,u:updateEntry});ls_set('tf_updatelogs',ulCache.slice(0,2000));
    await saveTask(updatedTask);
    if(CONFIG.SCRIPT_URL){try{await apiPost({action:'appendUpdateLog',log:{taskId:id,taskTitle:oldTask.title,u:updateEntry}});}catch(e){}}
  } else {
    // User: mở form nhập kết quả → gửi chờ admin duyệt
    openDoneRequest(id);
  }
}

async function submitDoneRequest(id) {
  const t = tasks.find(x=>x.id===id); if(!t) return;
  const result = (v('done-result')||'').trim();
  if (!result) { toast('Vui lòng nhập kết quả đạt được!','error'); return; }
  const note = (v('done-note')||'').trim();
  const now = new Date().toISOString();
  const updateEntry = { time:now, content:`📤 Báo cáo hoàn thành: ${result.substring(0,60)}`, detail:`Kết quả: ${result}${note?' | Ghi chú: '+note:''}`, user:CONFIG.USERNAME, status:'pending_done', progress:100 };
  const updatedTask = {...t, status:'pending_done', progress:100, result, progressNote: note||t.progressNote, updatedBy:CONFIG.USERNAME, updatedAt:now, updates:[...(t.updates||[]),updateEntry]};
  tasks = tasks.map(x=>x.id===id?updatedTask:x);
  ls_set('tf_tasks',tasks);
  addNotification({ to:ADMIN_USER, type:'done_request', taskId:t.id, icon:'📋',
    title:`Chờ duyệt hoàn thành: ${t.title.substring(0,40)}`,
    body:`${CONFIG.USERNAME}: ${result.substring(0,80)}`,
    extra:{ result, note, requestedBy:CONFIG.USERNAME, requestedAt:now } });
  closeModal(); render();
  toast('📤 Đã gửi báo cáo, chờ admin duyệt!');
  const ulCache=ls_get('tf_updatelogs',[]);ulCache.unshift({taskId:id,taskTitle:t.title,u:updateEntry});ls_set('tf_updatelogs',ulCache.slice(0,2000));
  await saveTask(updatedTask);
  if(CONFIG.SCRIPT_URL){try{await apiPost({action:'appendUpdateLog',log:{taskId:id,taskTitle:t.title,u:updateEntry}});}catch(e){}}
}

  const opts = assignees.map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join('');
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `<div class="overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:460px">

      </div>

        <div style="font-size:11px;color:var(--muted);margin-top:4px">👤 ${esc(t.assignee)} · ${t.result?'Có kết quả báo cáo':'Chưa có kết quả'}</div>

        <div><label class="field-label">Yêu cầu đánh giá (tùy chọn)</label>

async function submitAssignReviewer(taskId) {
  const reviewer = document.getElementById('ar-reviewer')?.value;
  if (!reviewer) { toast('Vui lòng chọn người đánh giá!', 'error'); return; }
  const note = (document.getElementById('ar-note')?.value||'').trim();
  const t = tasks.find(x=>String(x.id)===String(taskId)); if(!t) return;
  const now = new Date().toISOString();
  const updateEntry = {time:now, content:`👁 Chuyển đánh giá cho ${reviewer}${note?' | '+note:''}`, user:CONFIG.USERNAME, status:'pending_review', progress:t.progress, reviewer};
  const updatedTask = {...t, status:'pending_review', reviewer, reviewerNote:note,
    updatedBy:CONFIG.USERNAME, updatedAt:now, updates:[...(t.updates||[]),updateEntry]};
  tasks = tasks.map(x=>String(x.id)===String(taskId)?updatedTask:x);
  ls_set('tf_tasks',tasks);
  addNotification({to:reviewer, type:'review_request', taskId:t.id, icon:'👁',
    title:`Đánh giá kết quả: ${t.title.substring(0,40)}`,
    body:`${CONFIG.USERNAME} nhờ bạn đánh giá${note?' | '+note:''}`,
    extra:{requestedBy:CONFIG.USERNAME, note}});
  closeModal(); render(); toast(`👁 Đã gửi yêu cầu đánh giá cho ${reviewer}!`);
  await saveTask(updatedTask);
  // Ghi reviewer trực tiếp lên GAS (đảm bảo sync sang máy khác)
  if (CONFIG.SCRIPT_URL) {
    try {
      await apiPost({action:'setReviewer', taskId:t.id, reviewer, status:'pending_review'});
    } catch(e) { console.warn('[setReviewer] failed:', e.message); }
  }
}

function openSubmitReview(taskId) {
  let t = tasks.find(x=>String(x.id)===String(taskId)); if(!t) return;
  // Decode reviewer từ nhiều nguồn
  if (!t.reviewer) {
    const re1 = (t.updates||[]).slice().reverse().find(u=>u.reviewer&&u.status==='pending_review');
    if (re1) { t = {...t, reviewer: re1.reviewer}; }
    else {
      const ae = (t.updates||[]).slice().reverse().find(u=>(u.content||'').startsWith('👁 Chuyển đánh giá cho '));
      if (ae) {
        const rv = (ae.content||'').replace('👁 Chuyển đánh giá cho ','').split('|')[0].trim().split(' ')[0];
        if (rv) t = {...t, reviewer: rv};
      } else {
        const rm2 = (t.result||'').match(/__RV__([^_]+)__RV__/);
        if (rm2) t = {...t, reviewer: rm2[1]};
        else {
          const src = t.progressNote||t.note||'';
          const rm3 = src.match(/\[RV:([^\]]+)\]/) || src.match(/\[REVIEWER:([^\]]+)\]/);
          if (rm3) t = {...t, reviewer: rm3[1]};
        }
      }
    }
  }
  if (t.reviewer !== CONFIG.USERNAME && !isAdmin()) {
    toast('Bạn không được chỉ định đánh giá việc này (reviewer: '+(t.reviewer||'N/A')+', bạn: '+CONFIG.USERNAME+')','error');
    return;
  }
  const result = t.result || '';
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `<div class="overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="flex" style="justify-content:space-between;margin-bottom:16px">
        <h3 style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800">👁 Đánh giá kết quả</h3>
        <button class="btn btn-ghost btn-icon" onclick="closeModal()">✕</button>
      </div>
      <div style="background:#0A0F1E;border-radius:10px;padding:12px;margin-bottom:14px">
        <div style="font-weight:700;font-size:13px;margin-bottom:6px">${esc(t.title)}</div>
        ${t.desc?`<div style="background:rgba(79,110,255,.07);border-left:3px solid var(--accent);border-radius:6px;padding:8px 10px;font-size:13px;margin-bottom:6px"><span style="color:var(--accent);font-size:11px;font-weight:700;display:block;margin-bottom:2px">🎯 Mục tiêu:</span>${esc(t.desc)}</div>`:''}
        <div style="background:rgba(0,206,201,.07);border-left:3px solid #00CEC9;border-radius:6px;padding:8px 10px;font-size:13px;margin-top:6px"><span style="color:#00CEC9;font-size:11px;font-weight:700;display:block;margin-bottom:2px">📋 Kết quả đánh giá của ${esc(t.reviewer||'')}${t.reviewerSuggest?' · '+(t.reviewerSuggest==='approve'?'✅ Đề xuất duyệt':'↩️ Đề xuất làm lại'):''}</span>${t.reviewerOpinion?`<span style="white-space:pre-wrap">${esc(t.reviewerOpinion)}</span>`:`<span style="color:var(--muted);font-size:12px">Chưa có ý kiến đánh giá</span>`}</div>
        ${(()=>{
          // Kết quả: lấy từ update khi user bấm Báo cáo hoàn thành (detail field)
          const doneEntry = (t.updates||[]).slice().reverse()
            .find(u => u.status==='pending_done' && (u.detail||'').startsWith('Kết quả:'));
          const resultText = doneEntry
            ? (doneEntry.detail||'').replace('Kết quả:','').split('|')[0].trim()
            : (t.result||'');
          return resultText
            ? `<div style="background:rgba(46,204,113,.08);border-left:3px solid var(--green);border-radius:6px;padding:8px 10px;font-size:13px;margin-top:6px"><span style="color:var(--green);font-size:11px;font-weight:700;display:block;margin-bottom:2px">✅ Kết quả báo cáo:</span><span style="white-space:pre-wrap">${esc(resultText)}</span></div>`
            : '';
        })()}
        ${(()=>{
          // Chỉ đạo admin: ưu tiên note trong entry "Chuyển đánh giá", sau đó update tự gõ
          const assignEntry = (t.updates||[]).slice().reverse()
            .find(u => u.user===ADMIN_USER && (u.content||'').startsWith('👁 Chuyển đánh giá'));
          // Lấy phần note sau dấu | trong content "👁 Chuyển đánh giá cho X | <note>"
          const assignNote = assignEntry
            ? (assignEntry.content||'').split('|').slice(1).join('|').trim()
            : '';
          // Nếu không có, tìm update admin tự gõ (không phải auto)
          const autoPrefix = ['📌','✅','↩️','⏰','👁','📤','🔄','📋','Cập nhật bởi','⏳'];
          const manualEntry = (t.updates||[]).slice().reverse().find(u =>
            u.user === ADMIN_USER &&
            !autoPrefix.some(p => (u.content||'').startsWith(p))
          );
          const chidao = assignNote || (manualEntry ? manualEntry.content : '');
          const chidaoTime = assignNote ? assignEntry.time : (manualEntry ? manualEntry.time : null);
          if(!chidao) return '';
          return `<div style="background:rgba(255,159,67,.07);border-left:3px solid var(--orange);border-radius:6px;padding:8px 10px;font-size:13px;margin-top:6px">
            <span style="color:var(--orange);font-size:11px;font-weight:700;display:block;margin-bottom:2px">💬 Chỉ đạo của admin · ${chidaoTime?fmtDT(new Date(chidaoTime)):''}</span>
            <span style="white-space:pre-wrap">${esc(chidao)}</span>
          </div>`;
        })()}
        ${t.issue?`<div style="background:rgba(255,71,87,.07);border-left:3px solid var(--red);border-radius:6px;padding:8px 10px;font-size:13px;margin-top:6px"><span style="color:var(--red);font-size:11px;font-weight:700;display:block;margin-bottom:2px">⚠️ Vướng mắc:</span>${esc(t.issue)}</div>`:''}
      </div>
      ${isAdmin() ? `
        <div style="margin-top:12px"><label class="field-label">Ghi chú chỉ đạo (tuỳ chọn)</label>
          <textarea class="input" id="rv2-admin-note" rows="2" placeholder="Nhập thêm chỉ đạo nếu có..."></textarea></div>
        <div class="flex" style="margin-top:12px;gap:9px">
          <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Để sau</button>
          <button class="btn btn-danger btn-sm" style="flex:1" onclick="(async()=>{const n=document.getElementById('rv2-admin-note')?.value||'';closeModal();await processDoneReview(${taskId},'rejected',n)})()">↩️ Từ chối</button>
          <button class="btn btn-green" style="flex:2" onclick="(async()=>{const n=document.getElementById('rv2-admin-note')?.value||'';closeModal();await processDoneReview(${taskId},'approved',n)})()">✅ Duyệt hoàn thành</button>
        </div>
      ` : `
        <div class="flex-col">
          <div><label class="field-label">Kết quả đánh giá <span style="color:var(--red)">*</span></label>
            <textarea class="input" id="rv2-opinion" rows="3" placeholder="Nhận xét, đánh giá kết quả...">${esc(t.reviewerOpinion||'')}</textarea></div>
          <div style="display:flex;gap:8px">
            <div style="flex:1"><label class="field-label">Đề xuất</label>
              <select class="input" id="rv2-suggest">
                <option value="approve" ${t.reviewerSuggest==='approve'?'selected':''}>✅ Đề xuất duyệt</option>
                <option value="reject" ${t.reviewerSuggest==='reject'?'selected':''}>↩️ Đề xuất làm lại</option>
              </select></div>
          </div>
        </div>
        <div class="flex" style="margin-top:16px;gap:9px">
          <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Để sau</button>
          <button class="btn btn-primary" style="flex:2;background:#00CEC9;border-color:#00CEC9" onclick="submitReviewerOpinion(${taskId})">📤 Gửi đánh giá</button>
        </div>
      `}
    </div>
  </div>`;
}

async function submitReviewerOpinion(taskId) {
  const opinion = (document.getElementById('rv2-opinion')?.value||'').trim();
  if (!opinion) { toast('Vui lòng nhập ý kiến đánh giá!','error'); document.getElementById('rv2-opinion')?.focus(); return; }
  const suggest = document.getElementById('rv2-suggest')?.value || 'approve';
  const t = tasks.find(x=>String(x.id)===String(taskId)); if(!t) return;
  const now = new Date().toISOString();
  const icon = suggest==='approve' ? '✅' : '↩️';
  const updateEntry = {time:now, content:`👁 Đánh giá bởi ${CONFIG.USERNAME}: ${opinion.substring(0,60)}`, user:CONFIG.USERNAME, status:'pending_done', progress:t.progress};
  const updatedTask = {...t, status:'pending_done', reviewerOpinion:opinion, reviewerSuggest:suggest,
    updatedBy:CONFIG.USERNAME, updatedAt:now, updates:[...(t.updates||[]),updateEntry]};
  tasks = tasks.map(x=>String(x.id)===String(taskId)?updatedTask:x);
  ls_set('tf_tasks',tasks);
  addNotification({to:ADMIN_USER, type:'review_done', taskId:t.id, icon:'👁',
    title:`Đã đánh giá: ${t.title.substring(0,40)}`,
    body:`${CONFIG.USERNAME} ${suggest==='approve'?'đề xuất duyệt':'đề xuất làm lại'} | ${opinion.substring(0,60)}`,
    extra:{reviewer:CONFIG.USERNAME, opinion, suggest}});
  closeModal(); render(); toast('📤 Đã gửi đánh giá cho admin!');
  await saveTask(updatedTask);
}


// ── Star rating helper ────────────────────────────────────────────────────────
const RD_STAR_LABELS = ['','1 — Kém','2 — Trung bình thấp','3 — Trung bình','4 — Tốt','5 — Xuất sắc'];
function rdSetStar(val) {
  document.getElementById('rd-star-val').value = val;
  document.getElementById('rd-star-label').textContent = RD_STAR_LABELS[val] || val;
  const stars = document.querySelectorAll('#rd-stars .star');
  stars.forEach(s => {
    const sv = Number(s.dataset.v);
    s.classList.toggle('active', sv <= val);
  });
}
// Init star display on render
(function initRdStars() {
  const container = document.getElementById('rd-stars');
  if (!container) return;
  rdSetStar(3);
})();
async function processDoneReview(taskId, decision, extraNote) {
  const note = extraNote || (document.getElementById('rd-note')||{}).value || '';
  const adminRating = decision==='approved' ? Number(document.getElementById('rd-star-val')?.value || 3) : null;
  const t = tasks.find(x=>String(x.id)===String(taskId)); if(!t) return;
  const now = new Date().toISOString();
  let updatedTask;
  if (decision==='approved') {
    const starText = adminRating ? ` | ⭐ ${adminRating}/5` : '';
    const updateEntry = {time:now, content:`✅ Admin duyệt hoàn thành${note?' | '+note:''}${starText}`, detail:`Duyệt bởi ${CONFIG.USERNAME}${note?' | Nhận xét: '+note:''}${starText}`, user:CONFIG.USERNAME, status:'done', progress:100};
    updatedTask = {...t, status:'done', progress:100, adminRating, reviewer:null, reviewerOpinion:null, reviewerSuggest:null, reviewerNote:null, updatedBy:CONFIG.USERNAME, updatedAt:now, updates:[...(t.updates||[]),updateEntry]};
    toast('✅ Đã duyệt hoàn thành!');
    addNotification({to:t.assignee, type:'done_approved', taskId:t.id, icon:'✅',
      title:`Hoàn thành được duyệt: ${t.title.substring(0,40)}`,
      body: note ? `Admin nhận xét: ${note}` : 'Admin đã duyệt hoàn thành công việc của bạn'});
  } else {
    const updateEntry = {time:now, content:`↩️ Yêu cầu làm lại${note?' | '+note:''}`, detail:`Từ chối bởi ${CONFIG.USERNAME}${note?' | Lý do: '+note:''}`, user:CONFIG.USERNAME, status:'inprogress', progress:t.progress};
    updatedTask = {...t, status:'inprogress', updatedBy:CONFIG.USERNAME, updatedAt:now, updates:[...(t.updates||[]),updateEntry]};
    toast('↩️ Đã yêu cầu làm lại!');
    addNotification({to:t.assignee, type:'done_rejected', taskId:t.id, icon:'↩️',
      title:`Cần bổ sung/chỉnh sửa: ${t.title.substring(0,40)}`,
      body: note ? `Lý do: ${note}` : 'Admin yêu cầu bổ sung hoặc chỉnh sửa thêm'});
  }
  tasks = tasks.map(x=>String(x.id)===String(taskId)?updatedTask:x);
  ls_set('tf_tasks',tasks);
  const ulCache=ls_get('tf_updatelogs',[]);ulCache.unshift({taskId:t.id,taskTitle:t.title,u:updatedTask.updates.slice(-1)[0]});ls_set('tf_updatelogs',ulCache.slice(0,2000));
  closeModal(); render();
  await saveTask(updatedTask);
  if(CONFIG.SCRIPT_URL){try{await apiPost({action:'appendUpdateLog',log:{taskId:t.id,taskTitle:t.title,u:updatedTask.updates.slice(-1)[0]}});}catch(e){}}
}

async function submitReplanRequest(id) {
  const t = tasks.find(x=>String(x.id)===String(id)); if(!t) return;
  if(!isAdmin() && t.assignee !== CONFIG.USERNAME) { toast('Bạn không có quyền đề xuất gia hạn việc này','error'); return; }
  const _rpRaw = v('rp-newdue');
  const newDue = dmyToIso(_rpRaw) || _rpRaw;
  if (!newDue) { toast('Vui lòng chọn deadline mới!', 'error'); return; }
  const reason = v('rp-reason') || 'Khách quan (phụ thuộc bên ngoài)';
  const desc = (v('rp-desc')||'').trim();
  if (!desc) { toast('Vui lòng nhập mô tả chi tiết lý do gia hạn!', 'error'); document.getElementById('rp-desc')?.focus(); return; }
  const oldDue = formatDue(t.dueDate) || t.dueDate || 'N/A';
  const now = new Date().toISOString();

  if (isAdmin()) {
    const entry = {
      id: Date.now(), requestedBy: CONFIG.USERNAME, requestedAt: now,
      oldDue, newDue, reason, desc, status: 'approved',
      reviewedBy: CONFIG.USERNAME, reviewedAt: now
    };
    const newStatus = (t.status === 'overdue' || t.status === 'pending_replan') ? 'inprogress' : t.status;
    const updateEntry = {
      time: now,
      content: `📅 Gia hạn deadline: ${oldDue} → ${newDue} (${reason})`,
      detail: `Deadline cũ: ${oldDue} | Deadline mới: ${newDue} | Lý do: ${reason}${desc?' | '+desc:''}`,
      user: CONFIG.USERNAME, status: newStatus, progress: t.progress,
    };
    saveSnapshot(t);
    const updatedTask = {...t,
      dueDate: newDue, status: newStatus,
      replanHistory: [...(t.replanHistory||[]), entry],
      updates: [...(t.updates||[]), updateEntry],
      updatedBy: CONFIG.USERNAME, updatedAt: now
    };
    tasks = tasks.map(x=>String(x.id)===String(id) ? updatedTask : x);
    ls_set('tf_tasks', tasks);
    closeModal(); render();
    toast(`📅 Đã gia hạn đến ${newDue}!`);
    if(t.assignee && t.assignee !== CONFIG.USERNAME) {
      addNotification({ to: t.assignee, type:'replan_result', taskId:t.id, icon:'📅',
        title:`Deadline được gia hạn: ${t.title.substring(0,40)}`,
        body:`Deadline mới: ${newDue} | Lý do: ${reason}` });
    }
    await saveTask(updatedTask);
  } else {
    // User: lưu pending + push lên GSheets ngay để admin thấy
    const entry = {
      id: Date.now(), requestedBy: CONFIG.USERNAME, requestedAt: now,
      oldDue, newDue, reason, desc, status: 'pending',
      prevStatus: t.status  // lưu để restore nếu bị từ chối
    };
    const updatedTask = {...t,
      status: 'pending_replan',
      replanHistory: [...(t.replanHistory||[]), entry],
      updatedBy: CONFIG.USERNAME, updatedAt: now
    };
    tasks = tasks.map(x=>String(x.id)===String(id) ? updatedTask : x);
    ls_set('tf_tasks', tasks);
    addNotification({ to: ADMIN_USER, type:'replan_request', taskId:t.id, icon:'🔄',
      title:`Đề xuất gia hạn: ${t.title.substring(0,40)}`,
      body:`${CONFIG.USERNAME} đề xuất: ${oldDue} → ${newDue} | ${reason}`,
      extra: { oldDue, newDue, reason, desc, requestedBy: CONFIG.USERNAME, requestedAt: now } });
    closeModal(); render();
    toast('📤 Đã gửi đề xuất gia hạn cho admin!');
    // Push lên GSheets để admin thấy khi sync
    await saveTask(updatedTask);
  }
}

async function processReplan(taskId, replanId, decision) {
  // Đọc note và deadline TRƯỚC khi đóng modal
  const note = (document.getElementById('rv-note')||{}).value || '';
  const newDueOverride = (document.getElementById('rv-newdue')||{}).value || '';
  const t = tasks.find(x=>x.id===taskId); if(!t) return;
  // So sánh cả string lẫn number vì replanId truyền từ template
  const req = (t.replanHistory||[]).find(r=>String(r.id)===String(replanId));
  if(!req) { toast('Không tìm thấy yêu cầu gia hạn!','error'); return; }

  const now = new Date().toISOString();
  const updatedHistory = (t.replanHistory||[]).map(r=>
    String(r.id)===String(replanId)
      ? {...r, status:decision, reviewNote:note, reviewedAt:now, reviewedBy:CONFIG.USERNAME}
      : r
  );
  let updatedTask = {...t, replanHistory:updatedHistory, updatedBy:CONFIG.USERNAME, updatedAt:now};

  if (decision === 'approved') {
    updatedTask.dueDate = newDueOverride || req.newDue;
    // Reset pending_replan về inprogress sau khi duyệt
    if (updatedTask.status === 'pending_replan' || updatedTask.status === 'overdue') {
      updatedTask.status = 'inprogress';
    }
    updatedTask.updates = [...(updatedTask.updates||[]), {
      time: now,
      content: `✅ Gia hạn được duyệt: ${req.oldDue||'N/A'} → ${req.newDue} (${req.reason||''})`,
      detail: `Deadline cũ: ${req.oldDue||'N/A'} | Deadline mới: ${req.newDue} | Lý do: ${req.reason||''} | Người duyệt: ${CONFIG.USERNAME}${note?' | Ghi chú: '+note:''}`,
      user: CONFIG.USERNAME, status: updatedTask.status, progress: updatedTask.progress
    }];
  } else {
    // Từ chối: trả về overdue nếu trước đó là pending_replan (tức task đang overdue)
    if (updatedTask.status === 'pending_replan') {
      updatedTask.status = req.prevStatus || 'overdue';
    }
    updatedTask.updates = [...(updatedTask.updates||[]), {
      time: now,
      content: `❌ Từ chối gia hạn: đề xuất ${req.newDue} bị từ chối`,
      detail: `Deadline đề xuất: ${req.newDue} | Lý do từ chối: ${note||'Admin từ chối'} | Người xét: ${CONFIG.USERNAME}`,
      user: CONFIG.USERNAME, status: updatedTask.status, progress: updatedTask.progress
    }];
  }

  tasks = tasks.map(x=>x.id===taskId ? updatedTask : x);
  ls_set('tf_tasks', tasks);

  addNotification({
    to: req.requestedBy, type:'replan_result', taskId,
    icon: decision==='approved'?'✅':'❌',
    title: `${decision==='approved'?'Gia hạn được duyệt':'Đề xuất bị từ chối'}: ${t.title.substring(0,40)}`,
    body: decision==='approved' ? `Deadline mới: ${req.newDue}` : (note||'Admin đã từ chối')
  });

  closeModal(); render();
  toast(decision==='approved'?'✅ Đã phê duyệt gia hạn!':'❌ Đã từ chối đề xuất');
  await saveTask(updatedTask);
}

async function doAcceptTask(id) {
  const oldTask = tasks.find(t=>Number(t.id)===Number(id));
  if (!oldTask) return;
  const updateEntry = {
    time: new Date().toISOString(),
    content: `✅ Đã xác nhận tiếp nhận bởi ${CONFIG.USERNAME}`,
    detail: `Trạng thái: Chờ tiếp nhận → Đang làm | Người tiếp nhận: ${CONFIG.USERNAME}`,
    user: CONFIG.USERNAME, status: 'inprogress', progress: oldTask.progress||0
  };
  tasks = tasks.map(t=>t.id===id?{...t,
    status:'inprogress', accepted:true, acceptedAt:new Date().toISOString(),
    updatedBy:CONFIG.USERNAME, updatedAt:new Date().toISOString(),
    updates:[...(t.updates||[]),updateEntry]
  }:t);
  ls_set('tf_tasks', tasks);
  closeModal(); render();
  toast('✅ Đã xác nhận tiếp nhận công việc!');
  const task = tasks.find(t=>Number(t.id)===Number(id));

  // Notify admin
  addNotification({
    to: ADMIN_USER,
    type: 'task_accepted',
    taskId: id,
    icon: '✅',
    title: `Đã tiếp nhận: ${task.title.substring(0,40)}`,
    body: `${CONFIG.USERNAME} đã xác nhận tiếp nhận lúc ${fmtTime(new Date())}`
  });

  if (task) await saveTask(task);
}

async function connectTelegram() {
  if (!CONFIG.USERNAME) { toast('Vui lòng nhập tên người dùng trước!', 'error'); return; }
  if (!CONFIG.SCRIPT_URL) { toast('Cần cấu hình Script URL trước!', 'error'); return; }
  const payload = encodeURIComponent(CONFIG.USERNAME);
  const url = `https://t.me/${TG_BOT_NAME}?start=${payload}`;
  window.open(url, '_blank');
  toast('✈️ Đã mở Telegram — nhấn Start trong bot để hoàn tất!', 'info');
  const delays = [1200, 1800, 2500, 3500, 5000, 7000, 9000];
  for (let i = 0; i < delays.length; i++) {
    await sleep(delays[i]);
    try {
      const res = await apiGet({ action: 'getTelegramChatId', username: CONFIG.USERNAME });
      if (res && res.chatId) {
        CONFIG.TELEGRAM_CHAT_ID = String(res.chatId);
        localStorage.setItem('tf_telegram_chat_id', CONFIG.TELEGRAM_CHAT_ID);
        const manualEl = document.getElementById('cfg-tg-chatid-manual');
        if (manualEl) manualEl.value = CONFIG.TELEGRAM_CHAT_ID;
        toast('✅ Kết nối Telegram thành công! Chat ID: ' + CONFIG.TELEGRAM_CHAT_ID, 'success');
        render();
        return;
      }
    } catch(e) {}
  }
  toast('⌛ Chưa nhận được xác nhận từ Telegram. Hãy nhấn Start trong bot rồi thử lại sau vài giây.', 'warn');
}

async function disconnectTelegram() {
  if (!confirm('Huỷ nhận thông báo Telegram?')) return;
  if (CONFIG.SCRIPT_URL && CONFIG.USERNAME) {
    try { await apiPost({action:'clearTelegramChatId', username: CONFIG.USERNAME}); } catch(e) {}
  }
  CONFIG.TELEGRAM_CHAT_ID = '';
  localStorage.removeItem('tf_telegram_chat_id');
  toast('✈️ Đã huỷ kết nối Telegram');
  render();
}

    if (_digestSentAm) parts.push('Sáng: '+_digestSentAm);
    if (_digestSentPm) parts.push('Chiều: '+_digestSentPm);
    ls.textContent = parts.length ? 'Gửi lần cuối — ' + parts.join(' · ') : '';
  }
}

//===========================================================
// DAILY DIGEST ENGINE
//===========================================================
function buildDigestText(taskList, label) {
  const cfg = digestConfig;
  const pri = {critical:'🔴',high:'🟠',medium:'🟡',low:'🟢'};
  const d = new Date();
  const dayName = ['CN','T2','T3','T4','T5','T6','T7'][d.getDay()];
  const dateStr = String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
  const headerLabel = label ? ' — '+label : '';
  const lines = ['📊 <b>TaskFlow Daily Digest</b>'+headerLabel, dayName+' '+dateStr, ''];
  let hasIssue = false;

  // Base: tất cả task chưa xong (normalize status bằng daysLeft)
  const base = taskList.filter(t => t.status !== 'done').map(t => {
    const dl = daysLeft(t.dueDate);
    // Normalize overdue: nếu dueDate đã qua nhưng status chưa cập nhật
    if (dl < 0 && !['done','pending_done','pending_review','pending_accept','pending_replan'].includes(t.status)) {
      return {...t, status:'overdue', _dl:dl};
    }
    return {...t, _dl:dl};
  });

  // watch: lấy từ toàn bộ taskList để hiện đúng task admin chọn (kể cả done)
  const watch = cfg.watchedTaskIds && cfg.watchedTaskIds.length > 0
    ? taskList.map(t => ({...t, _dl: daysLeft(t.dueDate)})).filter(t => cfg.watchedTaskIds.includes(String(t.id)))
    : base;

  // 1. Quá hạn
  if (cfg.sections.overdue) {
    const od = base.filter(t => t.status === 'overdue');
    if (od.length) {
      hasIssue = true;
      lines.push('🚨 <b>Quá hạn (' + od.length + ')</b>');
      od.sort((a,b) => a._dl - b._dl).slice(0,8).forEach(t => {
        lines.push('  '+(pri[t.priority]||'🟡')+' '+t.assignee+' — '+t.title+' (quá '+Math.abs(t._dl||0)+'n)');
      });
      if (od.length > 8) lines.push('  ... +' + (od.length-8) + ' khác');
      lines.push('');
    }

    // Sắp đến hạn trong 3 ngày
    const soon = base.filter(t => t._dl >= 0 && t._dl <= 3 && !['done','pending_done'].includes(t.status));
    if (soon.length) {
      hasIssue = true;
      lines.push('⏰ <b>Sắp đến hạn ≤3 ngày (' + soon.length + ')</b>');
      soon.sort((a,b) => a._dl - b._dl).forEach(t => {
        const dlTxt = t._dl === 0 ? 'Hôm nay!' : 'còn ' + t._dl + 'n';
        lines.push('  '+(pri[t.priority]||'🟡')+' '+t.assignee+' — '+t.title+' ('+dlTxt+')');
      });
      lines.push('');
    }
  }

  // 2. Chưa cập nhật >3 ngày
  if (cfg.sections.noUpdate) {
    const stale = base.filter(t => {
      if (['done','pending_accept','pending_done','pending_review'].includes(t.status)) return false;
      const upds = t.updates || [];
      if (!upds.length) return true;
      return Date.now() - new Date(upds[upds.length-1].time).getTime() > 3*86400000;
    });
    if (stale.length) {
      hasIssue = true;
      lines.push('⚠️ <b>Chưa cập nhật >3 ngày (' + stale.length + ')</b>');
      stale.slice(0,8).forEach(t => {
        const upds = t.updates || [];
        const ago = upds.length ? Math.floor((Date.now()-new Date(upds[upds.length-1].time).getTime())/86400000) : '?';
        lines.push('  '+(pri[t.priority]||'🟡')+' '+t.assignee+' — '+t.title+' ('+ago+'n chưa update)');
      });
      if (stale.length > 8) lines.push('  ... +' + (stale.length-8) + ' khác');
      lines.push('');
    }
  }

  // 3. Task theo lựa chọn của admin — hiển thị tiến độ chi tiết từng task
  if (cfg.sections.watched) {
    if (cfg.watchedTaskIds && cfg.watchedTaskIds.length > 0) {
      if (watch.length) {
        hasIssue = true;
        lines.push('📌 <b>Task theo dõi (' + watch.length + ')</b>');
        watch.forEach(t => {
          const upds = t.updates || [];
          const ago = upds.length ? Math.floor((Date.now()-new Date(upds[upds.length-1].time).getTime())/86400000) : null;
          const st = {inprogress:'▶',overdue:'🚨',pending_done:'📋',pending_review:'👁',todo:'○',pending_accept:'⏳',pending_replan:'⏰'}[t.status]||'?';
          // deadline warning
          let dlWarn = '';
          if (t._dl !== undefined) {
            if (t._dl < 0)       dlWarn = ' 🚨Quá '   +Math.abs(t._dl)+'n';
            else if (t._dl === 0) dlWarn = ' 🔴Hôm nay!';
            else if (t._dl <= 3)  dlWarn = ' ⏰Còn '   +t._dl+'n';
            else                  dlWarn = ' 📅'        +isoToDmy(t.dueDate);
          }
          // update warning
          const updateWarn = (ago !== null && ago > 3) ? ' ⚠️'+ago+'n' : (ago !== null ? ' ✏️'+ago+'n' : '');
          lines.push('  '+st+' '+(pri[t.priority]||'🟡')+' '+t.assignee+' — '+t.title);
          lines.push('    '+Math.round(t.progress||0)+'% '+dlWarn+updateWarn);
        });
        lines.push('');
      }
    } else {
      // Tổng quan theo người
      const users = [...new Set(base.map(t=>t.assignee).filter(Boolean))].sort();
      if (users.length) {
        hasIssue = true;
        lines.push('👥 <b>Tổng quan theo người</b>');
        users.forEach(u => {
          const ut   = base.filter(t => t.assignee === u);
          const done = taskList.filter(t => t.assignee === u && t.status === 'done').length;
          const od   = ut.filter(t => t.status === 'overdue').length;
          const soon = ut.filter(t => t._dl >= 0 && t._dl <= 3).length;
          const all  = taskList.filter(t => t.assignee === u).length;
          const bar  = all ? Math.round(done/all*5) : 0;
          const barS = '█'.repeat(bar)+'░'.repeat(5-bar);
          lines.push('  👤 <b>'+u+'</b> ['+barS+'] '+done+'/'+all
            +(od?' 🚨'+od:'')+(soon?' ⏰'+soon:''));
        });
        lines.push('');
      }
    }
  }

  if (!hasIssue) lines.push('✅ Không có vấn đề nào hôm nay!');
  return lines.join('\n');
}

async function sendDailyDigest(manual, label) {
  if (!CONFIG.TELEGRAM_CHAT_ID) {
    if (manual) toast('Chưa có Telegram Chat ID!', 'error');
    return;
  }
  const text = buildDigestText(tasks, label);
  try {
    const res = await apiPost({ action:'sendTelegram', chatId:String(CONFIG.TELEGRAM_CHAT_ID), text, user:CONFIG.USERNAME });
    if (res && res.sent) {
      _digestLastSent = today();
      localStorage.setItem('tf_digest_last_sent', _digestLastSent);
      if (manual) toast('✅ Đã gửi Daily Digest!', 'success');
    } else {
      if (manual) toast('❌ '+((res && (res.reason || res.error || (res.tgResult && res.tgResult.description))) || 'Lỗi gửi Telegram'), 'error');
    }
  } catch(e) {
    if (manual) toast('❌ '+e.message, 'error');
  }
}

function startDigestScheduler() {
  // Gửi 2 lần/ngày: 7:00 sáng và 17:00 chiều
  // Check mỗi 30 giây
  setInterval(function() {
    if (!isAdmin() || !digestConfig.enabled || !CONFIG.TELEGRAM_CHAT_ID) return;
    const now     = new Date();
    const h       = now.getHours();
    const m       = now.getMinutes();
    const todayStr = today();
    // 7:00 sáng
    if (h === 7 && m === 0 && _digestSentAm !== todayStr) {
      _digestSentAm = todayStr;
      localStorage.setItem('tf_digest_sent_am', _digestSentAm);
      sendDailyDigest(false, 'Buổi sáng 7:00');
    }
    // 17:00 chiều
    if (h === 17 && m === 0 && _digestSentPm !== todayStr) {
      _digestSentPm = todayStr;
      localStorage.setItem('tf_digest_sent_pm', _digestSentPm);
      sendDailyDigest(false, 'Buổi chiều 17:00');
    }
  }, 30000);
}

async function saveConfig() {
  const url=(document.getElementById('cfg-url')?.value||'').trim() || DEFAULT_SCRIPT_URL;
  const user=(document.getElementById('cfg-user')?.value||'').trim();
  if(!user){toast('Vui lòng nhập tên người dùng!','error');return;}
  CONFIG.SCRIPT_URL=url;CONFIG.USERNAME=user;
  localStorage.setItem('tf_script_url',url);localStorage.setItem('tf_shared_url',url);localStorage.setItem('tf_username',user);
  // TELEGRAM_CHAT_ID được quản lý riêng qua connectTelegram/disconnectTelegram
  if(!url){
    stopAutoSync();updateSyncBar('local');
    filters.assignee = (!isAdmin() && CONFIG.USERNAME) ? CONFIG.USERNAME : 'all';
    reportUser = isAdmin() ? 'all' : (CONFIG.USERNAME || 'all');
    toast('💾 Đã lưu (chế độ offline – không có Script URL)');render();return;
  }
  toast('⏳ Đang kết nối...','info');
  const ok=await syncFromSheets();
  if(ok){startAutoSync();initNotifications();
    filters.assignee = (!isAdmin() && CONFIG.USERNAME) ? CONFIG.USERNAME : 'all';
    reportUser = isAdmin() ? 'all' : (CONFIG.USERNAME || 'all');
    // Ghi log đăng nhập
    const loginLogs = ls_get('tf_loginlogs', []);
    loginLogs.unshift({ user: CONFIG.USERNAME, time: new Date().toISOString() });
    ls_set('tf_loginlogs', loginLogs.slice(0, 2000));
    toast(`✅ Kết nối thành công! Đã tải ${tasks.length} công việc.`);render();}
  else{toast('❌ Không thể kết nối. Kiểm tra lại URL.','error');}
}
async function testConnection() {
  const url=(document.getElementById('cfg-url')?.value||'').trim();
  if(!url){toast('Nhập URL trước!','error');return;}
  const resultEl=document.getElementById('cfg-result');
  const show=(html)=>{ if(resultEl) resultEl.innerHTML=html; };
  show(`<div style="color:var(--accent);font-size:13px;margin-top:8px"><span class="spin">↻</span> Đang test...</div>`);
  const oldUrl = CONFIG.SCRIPT_URL;
  CONFIG.SCRIPT_URL = url; // tạm set để apiGet dùng
  try {
    const data = await apiGet({action:'getTasks'});
    const ok = Array.isArray(data);
    show(ok
      ? `<div style="color:var(--green);font-size:13px;margin-top:8px">✅ Kết nối OK! ${data.length} tasks.</div>`
      : `<div style="color:var(--red);font-size:13px;margin-top:8px">❌ Response không hợp lệ: ${JSON.stringify(data).substring(0,100)}</div>`);
  } catch(e) {
    show(`<div style="color:var(--red);font-size:13px;margin-top:8px">❌ ${e.message}<br><span style="font-size:11px;color:var(--muted)">Kiểm tra: Script URL đúng chưa? GAS đã deploy với "Anyone" chưa?</span></div>`);
  } finally {
    CONFIG.SCRIPT_URL = oldUrl; // restore
  }
}
async function pasteScriptUrl() {
  try {
    const text = await navigator.clipboard.readText();
    if(text && text.includes('script.google.com')) {
      document.getElementById('cfg-url').value = text.trim();
      toast('📋 Đã dán URL!');
    } else if(text) {
      document.getElementById('cfg-url').value = text.trim();
      toast('📋 Đã dán!');
    } else {
      toast('Clipboard trống!','warn');
    }
  } catch(e) {
    // Fallback: focus vào input để user tự paste
    document.getElementById('cfg-url')?.focus();
    toast('Nhấn Ctrl+V / ⌘V để dán URL','warn');
  }
}
function debugReviewTasks() {
  // Hiện tất cả task liên quan reviewer + các task done gần đây
  const allRV = tasks.filter(t =>
    t.status==='pending_review' ||
    (t.updates||[]).some(u=>(u.content||'').startsWith('👁 Chuyển đánh giá'))
  );
  const info = allRV.map(t=>{
    const lastUpdate = (t.updates||[]).slice(-1)[0];
    const ae = (t.updates||[]).slice().reverse().find(u=>(u.content||'').startsWith('👁 Chuyển đánh giá cho '));
    const aeRV = ae ? ae.content.replace('👁 Chuyển đánh giá cho ','').split('|')[0].trim().split(' ')[0] : 'N/A';
    return `"${(t.title||'').substring(0,30)}"\n  status:${t.status} reviewer:${t.reviewer||'N/A'}\n  lastUpdate: ${lastUpdate?lastUpdate.content.substring(0,50):'N/A'}\n  contentRV:"${aeRV}"`;
  }).join('\n---\n');
  // Cũng hiện banner count
  const bannerCount = tasks.filter(t=>t.status==='pending_review'&&t.reviewer===CONFIG.USERNAME&&!t.reviewerOpinion).length;
  alert('Tasks liên quan ('+allRV.length+') | Banner count:'+bannerCount+'\n\n'+(info||'Không có')+'\n\nUSER: '+CONFIG.USERNAME);
}

function exportExcel() {
  if (!window.XLSX) { toast('Đang tải thư viện XLSX...', 'warn'); return; }
  try {
    // Sheet 1: Danh sách công việc
    const sheetTasks = tasks.map(t => ({
      'Đầu mối': t.assignee || '',
      'Phân loại': t.category || '',
      'PYC': t.pyc || '',
      'Công việc': t.title || '',
      'Mục tiêu': t.desc || '',
      'Ghi chú tiến độ': t.progressNote || '',
      'Vướng mắc': t.issue || '',
      'Deadline': t.dueDate || '',
      'Kết quả': t.result || '',
      'Trạng thái': STATUSES[t.status]?.label || t.status || '',
      '% hoàn thành': t.progress || 0,
      'Số lần gia hạn': (t.replanHistory || []).filter(r=>r.status==='approved').length,
      'Deadline sau gia hạn': (t.replanHistory || []).slice(-1)[0]?.newDue || '',
      'Lý do gia hạn gần nhất': (t.replanHistory || []).slice(-1)[0]?.reason || '',
      'Cập nhật bởi': t.updatedBy || '',
      'Thời gian cập nhật': t.updatedAt ? fmtDT(new Date(t.updatedAt)) : '',
    }));

    // Sheet 2: UpdateLog - chi tiết mỗi lần tác động
    const sheetLog = [];
    tasks.forEach(t => {
      (t.updates || []).forEach(u => {
        sheetLog.push({
          'Thời gian': u.time ? fmtDT(new Date(u.time)) : '',
          'Người cập nhật': u.user || '',
          'Công việc': t.title || '',
          'Đầu mối': t.assignee || '',
          'Trạng thái lúc cập nhật': STATUSES[u.status]?.label || u.status || '',
          '% lúc cập nhật': u.progress !== undefined ? u.progress : '',
          'Nội dung ghi chú': u.content || '',
          'Chi tiết thay đổi': u.detail || u.content || '',
        });
      });
      // Thêm replan history vào log
      (t.replanHistory || []).forEach(r => {
        sheetLog.push({
          'Thời gian': r.requestedAt ? fmtDT(new Date(r.requestedAt)) : '',
          'Người cập nhật': r.requestedBy || '',
          'Công việc': t.title || '',
          'Đầu mối': t.assignee || '',
          'Trạng thái lúc cập nhật': 'Gia hạn deadline',
          '% lúc cập nhật': '',
          'Nội dung ghi chú': `Gia hạn: ${r.oldDue} → ${r.newDue}`,
          'Chi tiết thay đổi': `Deadline cũ: ${r.oldDue} | Deadline mới: ${r.newDue} | Lý do: ${r.reason || ''} | Người thực hiện: ${r.reviewedBy || r.requestedBy}`,
        });
      });
    });
    // Sort log by time desc
    sheetLog.sort((a, b) => {
      const ta = a['Thời gian'] ? new Date(a['Thời gian'].split('/').reverse().join('-')) : 0;
      const tb = b['Thời gian'] ? new Date(b['Thời gian'].split('/').reverse().join('-')) : 0;
      return tb - ta;
    });

    const wb = XLSX.utils.book_new();
    const ws1 = XLSX.utils.json_to_sheet(sheetTasks);
    const ws2 = XLSX.utils.json_to_sheet(sheetLog.length ? sheetLog : [{'Thông báo':'Chưa có lịch sử cập nhật'}]);

    // Auto column width
    const setColWidths = (ws, data) => {
      if (!data.length) return;
      const cols = Object.keys(data[0]);
      ws['!cols'] = cols.map(k => ({ wch: Math.min(50, Math.max(k.length + 2, ...data.map(r => String(r[k]||'').length))) }));
    };
    setColWidths(ws1, sheetTasks);
    setColWidths(ws2, sheetLog.length ? sheetLog : []);

    XLSX.utils.book_append_sheet(wb, ws1, 'Danh sách CV');
    XLSX.utils.book_append_sheet(wb, ws2, 'UpdateLog');
    XLSX.writeFile(wb, `BaoCao_TaskFlow_${today()}.xlsx`);
    toast(`📥 Đã xuất Excel! (${sheetTasks.length} CV, ${sheetLog.length} bản ghi log)`);
  } catch(e) {
    console.error('Export error:', e);
    toast('❌ Lỗi xuất Excel: ' + e.message, 'error');
  }
}

function handleImportFile(input){if(input.files[0])processImportFile(input.files[0]);}
function processImportFile(file){
  if(!window.XLSX){toast('SheetJS chưa tải xong!','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){toast('File không có dữ liệu!','error');return;}
      const hdr=rows[0].map(h=>(h||'').toString().toLowerCase().trim());
      const fi=k=>hdr.findIndex(h=>h.includes(k));
      const iAssignee=fi('đầu mối'),iCat=fi('phân loại'),iPyc=fi('pyc'),iTitle=fi('công việc'),iDesc=fi('mục tiêu');
      const iProgress=Math.max(fi('tiến độ (có'),fi('tiến độ'));
      const iIssue=fi('vướng mắc'),iDue=fi('deadline'),iResult=fi('kết quả'),iNote=fi('ghi chú');
      const parsed=[];const todayStr=today();
      rows.slice(1).forEach((row,idx)=>{
        const title=(row[iTitle]||'').toString().trim();
        const assignee=(row[iAssignee]||'').toString().trim();
        if(!title&&!assignee)return;
        // User thường: chỉ lấy dữ liệu của mình (tự động)
        if(!isAdmin() && CONFIG.USERNAME && assignee !== CONFIG.USERNAME) return;
        let dueStr='';const dueRaw=row[iDue];
        if(dueRaw instanceof Date){dueStr=dueRaw.toISOString().split('T')[0];}
        else if(dueRaw){const s=dueRaw.toString().trim();const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m)dueStr=`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;else dueStr=s;}
        const result=(row[iResult]||'').toString().trim();
        const resultLow=result.toLowerCase();
        const progressNote=(row[iProgress]||'').toString().trim();
        let status,pct;
        if(resultLow.includes('hoàn thành')&&!resultLow.includes('chưa')){status='done';pct=100;}
        else if(dueStr.match(/^\d{4}-\d{2}-\d{2}$/)&&dueStr<todayStr){status='overdue';pct=0;}
        else if(progressNote){status='inprogress';pct=50;}
        else{status='todo';pct=0;}
        parsed.push({id:Date.now()+idx,title:title||'(chưa có tiêu đề)',desc:(row[iDesc]||'').toString().trim(),assignee,category:(row[iCat]||'').toString().trim(),pyc:(row[iPyc]||'').toString().trim(),progressNote,issue:(row[iIssue]||'').toString().trim(),dueDate:dueStr,result,note:(row[iNote]||'').toString().trim(),status,progress:pct,priority:'medium',remindAt:'09:00',tags:[(row[iCat]||'').toString().trim()].filter(Boolean),updates:[],replanHistory:[],accepted:false});
      });
      if(!parsed.length){
        if(!isAdmin()&&CONFIG.USERNAME) toast(`Không tìm thấy dữ liệu cho user "${CONFIG.USERNAME}" trong file!`,'warn');
        else toast('Không tìm thấy dữ liệu hợp lệ!','error');
        return;
      }
      importPreview=parsed;showImportPreview(file.name,parsed);
    }catch(err){toast('Lỗi đọc file: '+err.message,'error');}
  };
  reader.readAsBinaryString(file);
}

async function importLegacyDatabase() {
  if (!isAdmin()) { toast('Chỉ admin mới được import CSDL cũ!', 'error'); return; }
  if (!CONFIG.SCRIPT_URL) { toast('Cần cấu hình Script URL của hệ thống mới trước!', 'error'); return; }
  const resultEl = document.getElementById('legacy-import-result');
  const setMsg = (html) => { if (resultEl) resultEl.innerHTML = html; };
  if (!confirm('Import CSDL cũ sang file mới?\n\nSẽ tự động lấy dữ liệu từ file cũ và merge vào file hiện tại.')) return;
  setMsg('<span style="color:var(--accent)"><span class="spin">↻</span> Đang import dữ liệu cũ...</span>');
  try {
    const res = await apiPost({
      action:'importLegacyDb',
      legacySpreadsheetId: LEGACY_SPREADSHEET_ID,
      legacySheetUrl: LEGACY_SHEET_URL,
      legacyScriptUrl: LEGACY_SCRIPT_URL,
      user: CONFIG.USERNAME
    });
    if (!res || res.ok === false) throw new Error((res && res.error) || 'Import thất bại');
    await syncFromSheets(true);
    const sum = res.summary || {};
    const line = (name, label) => {
      const x = sum[name] || {added:0,updated:0,skipped:0};
      return `${label}: +${x.added||0} mới, ~${x.updated||0} cập nhật`;
    };
    const lines = [
      line('Tasks','Tasks'),
      line('UpdateLog','UpdateLog'),
      line('Notifications','Notifications'),
      line('Users','Users')
    ];
    setMsg(`<div style="color:var(--green);line-height:1.7">✅ Import xong từ CSDL cũ.<br>${lines.map(esc).join('<br>')}</div>`);
    toast(`✅ Đã import CSDL cũ${res.totalImported?` · ${res.totalImported} bản ghi mới/cập nhật`:''}`,'success');
    render();
  } catch(e) {
    const msg = e.message || String(e);
    setMsg(`<span style="color:var(--red)">❌ ${esc(msg)}</span>`);

  }
}

async function doImportSmart(){
  if(!importPreview.length)return;
  const scope = isAdmin() ? (document.getElementById('import-scope')?.value||'all') : CONFIG.USERNAME;
  const mode  = isAdmin() ? (document.getElementById('import-mode')?.value||'add_new') : 'add_new';

  if(mode==='overwrite'){
    const scopeLabel = scope==='all' ? 'toàn bộ dữ liệu' : `toàn bộ dữ liệu của "${scope}"`;
    if(!confirm(`Xác nhận GHI ĐÈ ${scopeLabel}?\nSẽ thay thế bằng ${importPreview.length} công việc từ file.`))return;
  }

  let finalTasks;
  if(mode==='overwrite'){
    if(scope==='all'){
      // Ghi đè tất cả
      finalTasks = importPreview.map(normalizeTask);
    } else {
      // Ghi đè chỉ theo user được chọn
      const otherTasks = tasks.filter(t=>t.assignee!==scope);
      const newForScope = importPreview.map(normalizeTask);
      finalTasks = [...otherTasks, ...newForScope];
    }
  } else {
    // Chỉ thêm mới: so sánh theo title+assignee để tránh trùng
    const existingKeys = new Set(tasks.map(t=>(t.title+'|'+t.assignee).toLowerCase().trim()));
    const base=Date.now();
    const toAdd = importPreview
      .filter(t => {
        const key = (t.title+'|'+t.assignee).toLowerCase().trim();
        return !existingKeys.has(key);
      })
      .map((t,i)=>normalizeTask({...t,id:base+i}));
    finalTasks = [...tasks, ...toAdd];
    const addedCount = toAdd.length;
    const skippedCount = importPreview.length - addedCount;
    tasks = finalTasks; ls_set('tf_tasks',tasks); cancelImport();
    toast(`➕ Đã thêm ${addedCount} công việc mới${skippedCount?` (bỏ qua ${skippedCount} trùng)`:''}!`,'success');
    if(CONFIG.SCRIPT_URL && toAdd.length){await apiPost({action:'upsertBatch',tasks:toAdd,user:CONFIG.USERNAME});toast('☁️ Đã đồng bộ!');}
    showView('tasks');
    return;
  }

  tasks = finalTasks; ls_set('tf_tasks',tasks); cancelImport();
  toast(`✅ Đã import ${importPreview.length} công việc!`,'success');
  if(CONFIG.SCRIPT_URL){toast('⏳ Đang đồng bộ...','info');await apiPost({action:'upsertBatch',tasks,user:CONFIG.USERNAME});toast('☁️ Đã đồng bộ!');}
  showView('tasks');
}

function buildAttachChip(a, existing) {
  var isImg = a.type && a.type.startsWith('image/');
  var sizeStr = a.size ? ' · ' + Math.round(a.size / 1024) + 'KB' : '';
  var removeBtn = existing ? '' : '<button onclick="removeAttach(\'' + a.name.replace(/'/g, "\\'") + '\')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0;margin-left:2px">✕</button>';

  if (isImg && a.data) {
    return '<div style="position:relative;display:inline-block;margin-right:4px">'
      + '<img src="' + a.data + '" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer" onclick="viewAttachImage(\'' + encodeURIComponent(a.name) + '\')" title="' + esc(a.name) + '">'
      + (existing ? '' : '<button onclick="removeAttach(\'' + a.name.replace(/'/g, "\\'") + '\')" style="position:absolute;top:-4px;right:-4px;background:var(--red);border:none;border-radius:50%;width:16px;height:16px;color:#fff;font-size:10px;cursor:pointer;line-height:1;padding:0">✕</button>')
      + '</div>';
  }

  var icons = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'🗜️',rar:'🗜️',txt:'📃'};
  var ext = (a.name || 'file').split('.').pop().toLowerCase();
  var icon = icons[ext] || '📎';
  var dlBtn = (a.data && !existing) ? '<a href="' + a.data + '" download="' + esc(a.name) + '" style="color:var(--accent);text-decoration:none;margin-left:2px">↓</a>' : '';

  return '<div style="display:inline-flex;align-items:center;gap:4px;background:#0A0F1E;border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-size:11px;max-width:160px">'
    + '<span>' + icon + '</span>'
    + '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">' + esc((a.name || 'file').substring(0, 20)) + '</span>'
    + '<span style="color:var(--muted);white-space:nowrap">' + sizeStr + '</span>'
    + dlBtn + removeBtn
    + '</div>';
}

// Keep backward compat
function renderAttachChip(a, existing) { return buildAttachChip(a, existing); }

function handleFileAttach(input) {
  var files = Array.from(input.files);
  if (!files.length) return;
  var maxSize = 3 * 1024 * 1024; // 3MB
  var loaded = 0;
  files.forEach(function(file) {
    if (file.size > maxSize) { toast('File "' + file.name + '" quá lớn (tối đa 3MB)', 'warn'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      _attachedFiles.push({ name: file.name, type: file.type, size: file.size, data: e.target.result });
      loaded++;
      renderNewAttachPreviews();
      if (loaded === files.length) toast('✅ Đã đính kèm ' + loaded + ' file');
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderNewAttachPreviews() {
  var el = document.getElementById('attach-preview');
  if (!el) return;
  // Remove all non-existing chips (those without data-ex attribute)
  Array.from(el.children).forEach(function(c) {
    if (!c.dataset || !c.dataset.ex) el.removeChild(c);
  });
  // Re-add new file chips
  _attachedFiles.forEach(function(a) {
    var div = document.createElement('div');
    div.innerHTML = buildAttachChip(a, false);
    el.appendChild(div.firstChild);
  });
}

function removeAttach(name) {
  _attachedFiles = _attachedFiles.filter(function(f) { return f.name !== name; });
  renderNewAttachPreviews();
  toast('🗑️ Đã bỏ file: ' + name);
}

function viewAttachImage(encodedName) {
  // Find image in _attachedFiles or current task attachments
  var name = decodeURIComponent(encodedName);
  var found = _attachedFiles.find(function(f) { return f.name === name; });
  if (!found) {
    // Search in current open task
    var taskId = parseInt(document.querySelector('[onclick^="doUpdate"]')?.getAttribute('onclick')?.match(/\d+/)?.[0] || 0);
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (task) found = (task.attachments || []).find(function(a) { return a.name === name; });
  }
  if (!found || !found.data) { toast('Không thể xem ảnh', 'error'); return; }
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;cursor:pointer';
  overlay.onclick = function() { overlay.remove(); };
  overlay.innerHTML = '<img src="' + found.data + '" style="max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px"><div style="color:#fff;font-size:13px">' + esc(name) + ' · Click để đóng</div>';
  document.body.appendChild(overlay);
}


function selStatus(s){
  // Nếu user thường chọn "Hoàn thành" → chuyển sang flow báo cáo hoàn thành
  const taskIdMatch = document.querySelector('[onclick^="doUpdate"]')?.getAttribute('onclick')?.match(/\d+/);
  const currentTaskId = taskIdMatch ? parseInt(taskIdMatch[0]) : null;
  if (s === 'done' && !isAdmin() && currentTaskId) {
    closeModal();
    openDoneRequest(currentTaskId);
    return;
  }
  // Không cho phép chọn pending_done trực tiếp
  if (s === 'pending_done') return;
  document.getElementById('u-status').value=s;
  Object.keys(STATUSES).forEach(k=>{const b=document.getElementById('sb-'+k);if(!b)return;const sv=STATUSES[k];b.style.background=k===s?`${sv.color}20`:'';b.style.color=k===s?sv.color:'';b.style.borderColor=k===s?`${sv.color}50`:'';});
  if(s==='done'){document.getElementById('u-prog').value=100;document.getElementById('pv').textContent='100%';}
}

async function doUpdate(id) {
  id = Number(id);
  // Kiểm tra ngay các element quan trọng
  const _dbg = {
    'u-status': document.getElementById('u-status'),
    'u-prog':   document.getElementById('u-prog'),
    'u-note':   document.getElementById('u-note'),
  };
  const _missing = Object.entries(_dbg).filter(([k,el])=>!el).map(([k])=>k);
  if(_missing.length){
    toast('❌ Lỗi form: thiếu trường ' + _missing.join(', '), 'error');
    console.error('[doUpdate] Missing elements:', _missing);
    return;
  }
  const status=v('u-status'),progress=parseInt(document.getElementById('u-prog')?.value||0);
  const note=v('u-note');
  const issue=v('u-issue')||'';
  const result=v('u-result')||'';
  const priority=v('u-priority')||'medium';
  const newTitle=(v('u-title')||'').trim();
  const newCat=(v('u-cat')||'').trim();
  const newDue=v('u-due')||'';
  const newDesc=(v('u-desc')||'').trim();
  const newAssignee=(v('u-assignee')||'').trim();
  const newPyc=(v('u-pyc')||'').trim();
  const oldTask = tasks.find(t=>Number(t.id)===Number(id));
  if (!oldTask) { toast('Không tìm thấy công việc!','error'); return; }
  // Chặn user thường sửa task của người khác
  if (!isAdmin() && oldTask.assignee !== CONFIG.USERNAME) {
    toast('⛔ Bạn chỉ có thể cập nhật công việc của mình!', 'error');
    return;
  }
  // User thường chọn "done" → chuyển sang flow báo cáo hoàn thành chờ duyệt
  if (!isAdmin() && status === 'done') {
    closeModal();
    openDoneRequest(id);
    return;
  }

  // Save snapshot before update
  saveSnapshot(oldTask);

  // Build chi tiết thay đổi
  const changes = [];
  if (oldTask.status !== status) changes.push(`Trạng thái: ${STATUSES[oldTask.status]?.label||oldTask.status} → ${STATUSES[status]?.label||status}`);
  if (oldTask.progress !== progress) changes.push(`Tiến độ: ${oldTask.progress}% → ${progress}%`);
  if (isAdmin() && oldTask.priority !== priority) changes.push(`Ưu tiên: ${PRIORITIES[oldTask.priority]?.label||oldTask.priority} → ${PRIORITIES[priority]?.label||priority}`);
  if (isAdmin() && newTitle && oldTask.title !== newTitle) changes.push(`Tiêu đề: "${newTitle.substring(0,40)}"`);
  if (isAdmin() && newCat && oldTask.category !== newCat) changes.push(`Danh mục: ${oldTask.category} → ${newCat}`);
  if (isAdmin() && newDue && oldTask.dueDate !== newDue) changes.push(`Deadline: ${oldTask.dueDate||'N/A'} → ${newDue} (sửa trực tiếp)`);
  if (isAdmin() && newDesc && (String(oldTask.desc||'')).trim() !== newDesc) changes.push(`Mục tiêu: "${newDesc.substring(0,60)}"`);
  if (isAdmin() && newAssignee && oldTask.assignee !== newAssignee) changes.push(`Đầu mối: ${oldTask.assignee} → ${newAssignee}`);
  if (isAdmin() && newPyc !== undefined && (String(oldTask.pyc||'')) !== newPyc) changes.push(`PYC: ${newPyc}`);
  if ((String(oldTask.issue||'')).trim() !== (issue||'').trim() && issue) changes.push(`Vướng mắc: "${issue.substring(0,60)}"`);
  if ((String(oldTask.result||'')).trim() !== (result||'').trim() && result) changes.push(`Kết quả: "${result.substring(0,60)}"`);
  if ((String(oldTask.progressNote||'')).trim() !== (note||'').trim() && note) changes.push(`Cập nhật TĐ: "${note.substring(0,60)}"`);
  const changeDetail = changes.length ? changes.join(' | ') : `Cập nhật bởi ${CONFIG.USERNAME}`;

  const updateEntry = {
    time: new Date().toISOString(),
    content: note || changeDetail,
    detail: changeDetail,
    user: CONFIG.USERNAME,
    status,
    progress,
  };

  tasks=tasks.map(t=>Number(t.id)===id?{...t,status,progress,progressNote:note,issue,result,
    ...(isAdmin()?{
      priority,
      ...(newTitle?{title:newTitle}:{}),
      ...(newCat?{category:newCat,tags:[newCat].filter(Boolean)}:{}),
      ...(newDue?{dueDate:newDue}:{}),
      ...(newDesc?{desc:newDesc}:{}),
      ...(newAssignee?{assignee:newAssignee}:{}),
      ...(newPyc!==undefined?{pyc:newPyc}:{}),
    }:{}),
    updatedBy:CONFIG.USERNAME,updatedAt:new Date().toISOString(),
    updates:[...(t.updates||[]),updateEntry]
  }:t);
  // Cập nhật cache updatelog ngay khi lưu local
  const existingUL = ls_get('tf_updatelogs', []);
  existingUL.unshift({taskId:id, taskTitle:oldTask.title, u:updateEntry});
  ls_set('tf_updatelogs', existingUL.slice(0,2000));
  ls_set('tf_tasks',tasks);
  closeModal();
  render();
  toast('⏳ Đang lưu...');
  const task=tasks.find(t=>Number(t.id)===Number(id));
  if(task){
    try {
      await saveTask(task);
      if(CONFIG.SCRIPT_URL){
        try { await apiPost({action:'appendUpdateLog', log:{taskId:id, taskTitle:oldTask.title, u:updateEntry}}); } catch(e){}
      }
      toast(`💾 Đã lưu${CONFIG.SCRIPT_URL?' và đồng bộ':' (local)'}!`);
    } catch(saveErr) {
      toast('⚠️ Đã lưu local, lỗi đồng bộ: ' + saveErr.message, 'error');
      console.error('[doUpdate] saveTask error:', saveErr);
    }
  } else {
    toast('💾 Đã lưu local!');
  }
  // Gửi Telegram cho admin khi user cập nhật (không gửi nếu chính admin tự sửa)
  if (!isAdmin() && CONFIG.SCRIPT_URL) {
    const updTask = tasks.find(t => Number(t.id) === Number(id));
    if (updTask) {
      const priMap = {critical:'🔴',high:'🟠',medium:'🟡',low:'🟢'};
      const stMap  = {inprogress:'▶ Đang làm',overdue:'🚨 Quá hạn',pending_done:'📋 Chờ duyệt HT',
        pending_review:'👁 Chờ đánh giá',done:'✅ Hoàn thành',todo:'○ Chưa làm'};
      const lines = [
        '⚡ <b>TaskFlow</b>',
        '✏️ <b>' + CONFIG.USERNAME + '</b> cập nhật công việc',
        '📋 ' + updTask.title,
        (priMap[updTask.priority]||'🟡') + ' ' + (stMap[updTask.status]||updTask.status) + ' | ' + Math.round(updTask.progress||0) + '%',
      ];
      // Hiện nội dung user nhập: ưu tiên note, sau đó result, issue, rồi changeDetail
      if (note && note.trim())   lines.push('💬 Ghi chú: ' + note);
      if (result && result.trim()) lines.push('📤 Kết quả: ' + result);
      if (issue && issue.trim())   lines.push('⚠️ Vướng mắc: ' + issue);
      if (!note && !result && !issue && changeDetail && changeDetail !== 'Cập nhật bởi ' + CONFIG.USERNAME) {
        lines.push('📝 ' + changeDetail);
      }
      if (updTask.dueDate) lines.push('📅 ' + (isoToDmy(updTask.dueDate)||updTask.dueDate));
      apiPost({ action:'sendTelegram', to: ADMIN_USER, text: lines.join('\n') }).catch(()=>{});
    }
  }
}
